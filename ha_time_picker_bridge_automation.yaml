# Bridge automation: push helper time into the selected Snoozefest alarm time entity.
# Prereqs:
# - input_datetime.snoozefest_time_picker (time-only helper)
# - input_text.snoozefest_alarm_id
# - optional input_text.snoozefest_env (defaults to snoozefest)

alias: Snoozefest - Time Picker Bridge To Alarm
mode: single
triggers:
  - trigger: state
    entity_id:
      - input_datetime.snoozefest_time_picker
conditions:
  - condition: template
    value_template: >-
      {{ states('input_text.snoozefest_alarm_id') not in ['', 'unknown', 'unavailable', 'none'] }}
actions:
  - action: text.set_value
    data:
      entity_id: >-
        {% set e = states('input_text.snoozefest_env') %}
        {% set env = e if e not in ['', 'unknown', 'unavailable', 'none'] else 'snoozefest' %}
        text.{{ env }}_alarm_{{ states('input_text.snoozefest_alarm_id') }}_time
      value: "{{ states('input_datetime.snoozefest_time_picker')[0:5] }}"
