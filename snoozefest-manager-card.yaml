type: vertical-stack
cards:
  - type: markdown
    content: |
      ## Snoozefest Manager

  - type: horizontal-stack
    cards:
      - type: custom:button-card
        entity: script.snoozefest_add_alarm
        name: Add Alarm
        icon: mdi:alarm-plus
        tap_action:
          action: more-info
