type: conditional
conditions:
  - entity: input_text.snoozefest_timer_id
    state_not: ""
  - entity: input_text.snoozefest_timer_id
    state_not: unknown
  - entity: input_text.snoozefest_timer_id
    state_not: unavailable
card:
  type: custom:config-template-card
  variables:
    - |-
      (function () {
        var rawId = states['input_text.snoozefest_timer_id'] && states['input_text.snoozefest_timer_id'].state
          ? String(states['input_text.snoozefest_timer_id'].state).trim()
          : '';
        if (!rawId || rawId === 'unknown' || rawId === 'unavailable') {
          return '';
        }

        var rawEnv = states['input_text.snoozefest_env'] && states['input_text.snoozefest_env'].state
          ? String(states['input_text.snoozefest_env'].state).trim()
          : '';
        var envCandidates = [];
        if (rawEnv && rawEnv !== 'unknown' && rawEnv !== 'unavailable') {
          envCandidates.push(rawEnv);
        }
        envCandidates.push('snoozefest');
        envCandidates.push('snoozefest_dev');

        var seen = {};
        for (var i = 0; i < envCandidates.length; i += 1) {
          var env = envCandidates[i];
          if (!env || seen[env]) {
            continue;
          }
          seen[env] = true;
          var base = env + '_timer_' + rawId;
          var durationKey = 'text.' + base + '_duration';
          if (states[durationKey]) {
            return base;
          }
        }

        // Fallback to selected env (or default) even if HA has not cached entity yet.
        return (rawEnv && rawEnv !== 'unknown' && rawEnv !== 'unavailable' ? rawEnv : 'snoozefest') + '_timer_' + rawId;
      })()
  entities:
    - input_text.snoozefest_env
    - input_text.snoozefest_timer_id
    - ${'text.' + vars[0] + '_duration'}
    - ${'text.' + vars[0] + '_label'}
    - ${'sensor.' + vars[0] + '_status'}
    - ${'sensor.' + vars[0] + '_remaining'}
    - ${'sensor.' + vars[0] + '_remaining_friendly'}
    - ${'button.' + vars[0] + '_add_time'}
    - ${'button.' + vars[0] + '_activate'}
    - ${'button.' + vars[0] + '_dismiss'}
  card:
    type: vertical-stack
    cards:
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:lovelace-multiline-text-input-card
            autosave: true
            entity: ${'text.' + vars[0] + '_label'}
            max_length: 12
            min_length: 0
            placeholder_text: ${'Timer ' + states['input_text.snoozefest_timer_id'].state}
            show_success_messages: false
            title: false
            buttons: false
            color: var(--primary-text-color)
            font_size: 1.2
            card_border: false
            card_background: transparent
            padding: 0
            padding_left_right: 4
          - type: custom:button-card
            entity: ${'sensor.' + vars[0] + '_status'}
            show_name: false
            show_icon: false
            show_state: true
            state_display: |-
              ${(() => {
                const statusEntity = 'sensor.' + vars[0] + '_status';
                const remainingFriendlyEntity = 'sensor.' + vars[0] + '_remaining_friendly';
                const remainingEntity = 'sensor.' + vars[0] + '_remaining';
                const status = states[statusEntity] && states[statusEntity].state ? states[statusEntity].state : '';
                const statusLower = String(status).toLowerCase();
                const remainingFriendly = states[remainingFriendlyEntity] && states[remainingFriendlyEntity].state && states[remainingFriendlyEntity].state !== 'unknown' && states[remainingFriendlyEntity].state !== 'unavailable'
                  ? states[remainingFriendlyEntity].state
                  : '';
                const remaining = states[remainingEntity] && states[remainingEntity].state && states[remainingEntity].state !== 'unknown' && states[remainingEntity].state !== 'unavailable'
                  ? states[remainingEntity].state
                  : '';
                if (statusLower === 'active' || statusLower === 'snoozed') {
                  return remainingFriendly || remaining || status;
                }
                return status;
              })()}
            color_type: card
            tap_action:
              action: none
            hold_action:
              action: none
            double_tap_action:
              action: none
            styles:
              card:
                - border: none
                - box-shadow: none
                - background: var(--primary-background-color)
                - padding: 4px
                - padding-right: 5px
              state:
                - align-self: bottom
                - justify-self: end
                - font-size: 0.7em
                - color: var(--primary-text-color)
      - type: custom:snoozefest-time-picker-card
        entity: ${'text.' + vars[0] + '_duration'}
        show_days: true
        show_seconds: true
        separator_mode: units
        autosave: true
        color: var(--primary-text-color)
        font_size: 2.5
        suffix_font_size: 0.5em
        suffix_opacity: 0.5
        suffix_padding: 8px 0px 0px 0px
        suffix_color: var(--secondary-text-color)
        card_border: false
        padding: 32px
        padding_left_right: 10px
        input_width: 1.2em
        show_steppers: true
        stepper_hit_height: 1.25em
        stepper_color: var(--secondary-text-color)
        stepper_opacity: 0.5
        stepper_active_opacity: 0.9
        stepper_input_pad_y: 0em
        stepper_offset: 1.4em
        stepper_size: 0.8em
        stepper_stroke: 0.12em
        pending_write_ms: 700
        input_background: rgba(1,1,1,0.1)
        input_border_radius: 0.2em
        input_padding: 0.8em
        content_justify: center
      - type: grid
        columns: 4
        square: false
        cards:
          - type: custom:button-card
            name: Add Time
            icon: mdi:plus
            entity: ${'button.' + vars[0] + '_add_time'}
            tap_action:
              action: call-service
              service: button.press
              data:
                entity_id: ${'button.' + vars[0] + '_add_time'}
            styles:
              name:
                - color: var(--primary-text-color)
                - font-size: 0.8em
                - padding: 3px
              icon:
                - color: var(--primary-text-color)
                - padding: 2px
          - type: custom:button-card
            name: Restart
            icon: mdi:restart
            entity: ${'button.' + vars[0] + '_activate'}
            tap_action:
              action: call-service
              service: button.press
              data:
                entity_id: ${'button.' + vars[0] + '_activate'}
            styles:
              name:
                - color: var(--primary-text-color)
                - font-size: 0.8em
                - padding: 3px
              icon:
                - color: var(--primary-text-color)
                - padding: 2px
          - type: custom:button-card
            name: Dismiss
            icon: mdi:timer-off-outline
            entity: ${'button.' + vars[0] + '_dismiss'}
            tap_action:
              action: javascript
              javascript: |
                [[[ 
                  (async () => {
                    const h = hass;
                    const target = entity?.entity_id || '';
                    try {
                      if (!target) {
                        return;
                      }
                      await h.callService('button', 'press', {
                        entity_id: target,
                      });
                    } finally {
                      await h.callService('input_text', 'set_value', {
                        entity_id: 'input_text.snoozefest_timer_id',
                        value: '',
                      });
                    }
                  })();
                ]]]
            styles:
              name:
                - color: var(--primary-text-color)
                - font-size: 0.8em
                - padding: 3px
              icon:
                - color: var(--primary-text-color)
                - padding: 2px
          - type: custom:button-card
            name: Start
            icon: mdi:play
            entity: ${'button.' + vars[0] + '_activate'}
            tap_action:
              action: javascript
              javascript: |
                [[[ 
                  (async () => {
                    const h = hass;
                    const target = entity?.entity_id || '';
                    try {
                      if (!target) {
                        return;
                      }
                      await h.callService('button', 'press', {
                        entity_id: target,
                      });
                    } finally {
                      await h.callService('input_text', 'set_value', {
                        entity_id: 'input_text.snoozefest_timer_id',
                        value: '',
                      });
                    }
                  })();
                ]]]
            styles:
              name:
                - color: var(--primary-text-color)
                - font-size: 0.8em
                - padding: 3px
              icon:
                - color: var(--primary-text-color)
                - padding: 2px