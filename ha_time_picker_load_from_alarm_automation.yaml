# Bridge automation: keep helper picker in sync with selected Snoozefest alarm time.
# Triggered when selection/env changes so popup opens with the current alarm time.

alias: Snoozefest - Time Picker Load From Alarm
mode: single
triggers:
  - trigger: state
    entity_id:
      - input_text.snoozefest_alarm_id
      - input_text.snoozefest_env
conditions:
  - condition: template
    value_template: >-
      {{ states('input_text.snoozefest_alarm_id') not in ['', 'unknown', 'unavailable', 'none'] }}
actions:
  - variables:
      env: >-
        {% set e = states('input_text.snoozefest_env') %}
        {{ e if e not in ['', 'unknown', 'unavailable', 'none'] else 'snoozefest' }}
      source_entity: text.{{ env }}_alarm_{{ states('input_text.snoozefest_alarm_id') }}_time
      source_value: "{{ states(source_entity) }}"
  - condition: template
    value_template: "{{ source_value not in ['', 'unknown', 'unavailable', 'none'] }}"
  - action: input_datetime.set_datetime
    data:
      entity_id: input_datetime.snoozefest_time_picker
      time: >-
        {% if source_value | length == 5 %}
          {{ source_value }}:00
        {% else %}
          {{ source_value }}
        {% endif %}
