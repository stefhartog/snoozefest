# Snoozefest alarm list card with columns (auto-populated)
# Requires:
# - custom:flex-table-card
#
# Default filter is for production prefix (snoozefest).
# If needed, switch pattern to snoozefest_dev.
type: custom:flex-table-card
title: Snoozefest Alarms
sort_by: sort_remaining+
css:
  "table": "width: 100% !important; table-layout: fixed;"
  "tr td": "padding: 0 !important;"
  "th": "padding: 6px 10px !important;"
  "thead th:nth-child(1), tbody td:nth-child(1)": "width: 46% !important;"
  "thead th:nth-child(2), tbody td:nth-child(2)": "width: 18% !important;"
  "thead th:nth-child(3), tbody td:nth-child(3)": "width: 18% !important;"
  "thead th:nth-child(4), tbody td:nth-child(4)": "width: 18% !important;"
  "tbody tr:nth-child(odd)": "background-color: transparent !important;"
  "tbody tr:nth-child(even)": "background-color: transparent !important;"
  "tbody tr:hover": "background-color: transparent !important;"
  "tbody tr:hover span": "filter: brightness(1.4) !important; opacity: 1 !important;"
  "tbody tr:hover td": "background-color: transparent !important; filter: none !important;"
entities:
  include: sensor.snoozefest_alarm_*_remaining
columns:
  - name: Name
    data: entity_id
    modify: >-
      (() => {
        const h = document.querySelector('home-assistant')?.hass;
        if (!h) return x;
        const statusId = x.replace('_remaining', '_status');
        const ent = h.states?.[statusId];
        const raw = ent?.attributes?.friendly_name || ent?.name || x;
        const name = String(raw)
          .replace(/^Snoozefest(?: Dev)? Alarm - /, '')
          .replace(/\s+Status$/, '')
          .replace(/\s+\d+$/, '');
        const st = String(ent?.state || '').toLowerCase();
        const bg = st === 'ringing'
          ? 'rgba(220,53,69,0.22)'
          : (st === 'active' || st === 'on')
            ? 'rgba(40,167,69,0.20)'
            : st === 'snoozed'
              ? 'rgba(255,193,7,0.24)'
              : (st === 'inactive' || st === 'off' || st === 'idle')
                ? 'rgba(108,117,125,0.16)'
                : 'rgba(23,162,184,0.16)';
        return '<span style="display:block;background:' + bg + ';padding:8px 10px;border-radius:0;">' + name + '</span>';
      })()
    tap_action:
      action: navigate
      navigation_path: /config/devices/device/col[4]
  - name: Status
    data: entity_id
    align: right
    modify: >-
      (() => {
        const h = document.querySelector('home-assistant')?.hass;
        if (!h) return '--';
        const statusId = x.replace('_remaining', '_status');
        const status = String(h.states?.[statusId]?.state || '--');
        const st = status.toLowerCase();
        const bg = st === 'ringing'
          ? 'rgba(220,53,69,0.22)'
          : (st === 'active' || st === 'on')
            ? 'rgba(40,167,69,0.20)'
            : st === 'snoozed'
              ? 'rgba(255,193,7,0.24)'
              : (st === 'inactive' || st === 'off' || st === 'idle')
                ? 'rgba(108,117,125,0.16)'
                : 'rgba(23,162,184,0.16)';
        return '<span style="display:block;background:' + bg + ';padding:8px 10px;border-radius:0;">' + status + '</span>';
      })()
    tap_action:
      action: navigate
      navigation_path: /config/devices/device/col[4]
  - name: Time Set
    data: entity_id
    align: right
    modify: >-
      (() => {
        const h = document.querySelector('home-assistant')?.hass;
        if (!h) return '--:--';
        const statusId = x.replace('_remaining', '_status');
        const st = String(h.states?.[statusId]?.state || '').toLowerCase();
        const bg = st === 'ringing'
          ? 'rgba(220,53,69,0.22)'
          : (st === 'active' || st === 'on')
            ? 'rgba(40,167,69,0.20)'
            : st === 'snoozed'
              ? 'rgba(255,193,7,0.24)'
              : (st === 'inactive' || st === 'off' || st === 'idle')
                ? 'rgba(108,117,125,0.16)'
                : 'rgba(23,162,184,0.16)';
        const id = x.replace('sensor.', 'text.').replace('_remaining', '_time');
        const v = h.states?.[id]?.state || '--:--';
        return '<span style="display:block;background:' + bg + ';padding:8px 10px;border-radius:0;">' + v + '</span>';
      })()
    tap_action:
      action: navigate
      navigation_path: /config/devices/device/col[4]
  - name: Time Remaining
    data: entity_id
    align: right
    modify: >-
      (() => {
        const h = document.querySelector('home-assistant')?.hass;
        if (!h) return '--';
        const statusId = x.replace('_remaining', '_status');
        const remaining = String(h.states?.[x]?.state || '--');
        const st = String(h.states?.[statusId]?.state || '').toLowerCase();
        const bg = st === 'ringing'
          ? 'rgba(220,53,69,0.22)'
          : (st === 'active' || st === 'on')
            ? 'rgba(40,167,69,0.20)'
            : st === 'snoozed'
              ? 'rgba(255,193,7,0.24)'
              : (st === 'inactive' || st === 'off' || st === 'idle')
                ? 'rgba(108,117,125,0.16)'
                : 'rgba(23,162,184,0.16)';
        return '<span style="display:block;background:' + bg + ';padding:8px 10px;border-radius:0;">' + remaining + '</span>';
      })()
    tap_action:
      action: navigate
      navigation_path: /config/devices/device/col[4]
  - id: device_id
    data: entity_id
    hidden: true
    modify: >-
      (() => {
        const h = document.querySelector('home-assistant')?.hass;
        const statusId = x.replace('_remaining', '_status');
        return h?.entities?.[statusId]?.device_id || h?.entities?.[x]?.device_id || '';
      })()
  - id: sort_remaining
    data: state
    hidden: true
    modify: >-
      (() => {
        const raw = String(x || '').trim().toLowerCase();
        if (!raw || raw === '--' || raw === 'unknown' || raw === 'unavailable' || raw === 'none') {
          return '9999999999';
        }

        let secs = NaN;

        // Supports dd:hh:mm:ss, hh:mm:ss and mm:ss.
        if (/^\d{1,2}:\d{2}:\d{2}:\d{2}$/.test(raw)) {
          const parts = raw.split(':').map(Number);
          secs = parts[0] * 86400 + parts[1] * 3600 + parts[2] * 60 + parts[3];
        } else if (/^\d{1,2}:\d{2}(:\d{2})?$/.test(raw)) {
          const parts = raw.split(':').map(Number);
          secs = parts.length === 3
            ? (parts[0] * 3600 + parts[1] * 60 + parts[2])
            : (parts[0] * 60 + parts[1]);
        }

        // Supports values like "1h 5m 2s", "35m", "40s".
        if (Number.isNaN(secs)) {
          const d = /(-?\d+)\s*d/.exec(raw);
          const hPart = /(-?\d+)\s*h/.exec(raw);
          const m = /(-?\d+)\s*m/.exec(raw);
          const s = /(-?\d+)\s*s/.exec(raw);
          if (d || hPart || m || s) {
            secs = (d ? Number(d[1]) : 0) * 86400
              + (hPart ? Number(hPart[1]) : 0) * 3600
              + (m ? Number(m[1]) : 0) * 60
              + (s ? Number(s[1]) : 0);
          }
        }

        // As a fallback, try plain numeric values.
        if (Number.isNaN(secs)) {
          const n = Number(raw);
          secs = Number.isFinite(n) ? n : 9999999999;
        }

        if (!Number.isFinite(secs) || secs < 0) secs = 9999999999;
        return String(Math.floor(secs)).padStart(10, '0');
      })()
