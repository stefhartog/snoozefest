type: conditional
conditions:
  - entity: text.snoozefest_manager_selected_timer_id
    state_not: ""
  - entity: text.snoozefest_manager_selected_timer_id
    state_not: unknown
  - entity: text.snoozefest_manager_selected_timer_id
    state_not: unavailable
card:
  type: custom:config-template-card
  variables:
    - |-
      (function () {
        var rawId = states['text.snoozefest_manager_selected_timer_id'] && states['text.snoozefest_manager_selected_timer_id'].state
          ? String(states['text.snoozefest_manager_selected_timer_id'].state).trim()
          : '';
        if (!rawId || rawId === 'unknown' || rawId === 'unavailable') {
          return '';
        }

        var env = (window.SNOOZEFEST_PREFIX && String(window.SNOOZEFEST_PREFIX).trim()) || 'snoozefest';
        return env + '_timer_' + rawId;
      })()
  entities:
    - text.snoozefest_manager_selected_timer_id
    - ${'text.' + vars[0] + '_duration'}
    - ${'text.' + vars[0] + '_label'}
    - ${'sensor.' + vars[0] + '_status'}
    - ${'sensor.' + vars[0] + '_remaining'}
    - ${'sensor.' + vars[0] + '_remaining_friendly'}
    - ${'button.' + vars[0] + '_add_time'}
    - ${'button.' + vars[0] + '_pause'}
    - ${'button.' + vars[0] + '_resume'}
    - ${'button.' + vars[0] + '_activate'}
    - ${'button.' + vars[0] + '_reset'}
    - ${'button.' + vars[0] + '_remove'}
    - ${'button.' + vars[0] + '_dismiss'}
  card:
    type: vertical-stack
    cards:
      - type: conditional
        conditions:
          - entity: ${'sensor.' + vars[0] + '_status'}
            state_not: ""
          - entity: ${'sensor.' + vars[0] + '_status'}
            state_not: unknown
          - entity: ${'sensor.' + vars[0] + '_status'}
            state_not: unavailable
        card:
          type: grid
          columns: 2
          square: false
          cards:
            - type: custom:snoozefest-multiline-text-input-card
              autosave: true
              entity: ${'text.' + vars[0] + '_label'}
              max_length: 12
              min_length: 0
              placeholder_text: ${'Timer ' + states['text.snoozefest_manager_selected_timer_id'].state}
              show_success_messages: false
              title: false
              buttons: false
              color: var(--secondary-text-color)
              font_size: 1
              card_border: false
              card_background: transparent
              padding: null
              padding_left: 2
              padding_top: 4
            - type: custom:button-card
              entity: ${'sensor.' + vars[0] + '_status'}
              show_name: false
              show_icon: false
              show_state: true
              state_display: |-
                ${(() => {
                  const statusEntity = 'sensor.' + vars[0] + '_status';
                  const remainingFriendlyEntity = 'sensor.' + vars[0] + '_remaining_friendly';
                  const remainingEntity = 'sensor.' + vars[0] + '_remaining';
                  const status = states[statusEntity] && states[statusEntity].state ? states[statusEntity].state : '';
                  const statusLower = String(status).toLowerCase();
                  const remainingFriendly = states[remainingFriendlyEntity] && states[remainingFriendlyEntity].state && states[remainingFriendlyEntity].state !== 'unknown' && states[remainingFriendlyEntity].state !== 'unavailable'
                    ? states[remainingFriendlyEntity].state
                    : '';
                  const remaining = states[remainingEntity] && states[remainingEntity].state && states[remainingEntity].state !== 'unknown' && states[remainingEntity].state !== 'unavailable'
                    ? states[remainingEntity].state
                    : '';
                  if (statusLower === 'active') {
                    return remainingFriendly || remaining || status;
                  }
                  if (statusLower === 'paused') {
                    return (remainingFriendly || remaining) ? ('Paused ' + (remainingFriendly || remaining)) : status;
                  }
                  return status;
                })()}
              color_type: card
              tap_action:
                action: none
              hold_action:
                action: none
              double_tap_action:
                action: none
              styles:
                card:
                  - border: none
                  - box-shadow: none
                  - background: var(--primary-background-color)
                  - padding: 0px
                  - padding-top: 7px
                  - padding-right: 5px
                state:
                  - align-self: bottom
                  - justify-self: end
                  - font-size: 0.7em
                  - color: rgba(255,255,255,0.2)
      - type: conditional
        conditions:
          - entity: ${'sensor.' + vars[0] + '_status'}
            state_not: ""
          - entity: ${'sensor.' + vars[0] + '_status'}
            state_not: unknown
          - entity: ${'sensor.' + vars[0] + '_status'}
            state_not: unavailable
          - entity: ${'sensor.' + vars[0] + '_status'}
            state_not: Inactive
        card:
          type: custom:snoozefest-entity-card
          entity: ${'text.' + vars[0] + '_duration'}
          display_entity: ${'sensor.' + vars[0] + '_remaining'}
          read_only: true
          show_days: false
          show_seconds: true
          autosave: true
          color: var(--primary-text-color)
          font_size: 5
          separator_mode: units
          suffix_font_size: 0.2em
          suffix_opacity: 0.5
          suffix_padding: 0px 0px 0px 0px
          suffix_color: var(--secondary-text-color)
          card_border: false
          padding_top: 20px
          padding_bottom: 20px
          padding_left: 28px
          padding_right: 20px
          input_width: 1.2em
          show_steppers: true
          stepper_color: var(--secondary-text-color)
          stepper_opacity: 0.5
          stepper_active_opacity: 0.9
          stepper_size: 2em
          stepper_hit_height: 6em
          stepper_input_pad_y: 0.8em
          stepper_offset: 0.2em
          stepper_stroke: 0.16em
          pending_write_ms: 700
          status_color_target: card
          status_color_default: var(--secondary-back-color)
          status_color_active: rgba(43, 71, 150,0.3)
          status_color_paused: rgba(138, 128, 51,0.3)
          status_color_snoozed: rgba(138, 128, 51,0.3)
          status_color_ringing: rgba(145, 50, 44,0.3)
          input_border_radius: 0.2em
          input_padding: 0.18em
          content_justify: center
      - type: conditional
        conditions:
          - entity: ${'sensor.' + vars[0] + '_status'}
            state_not: ""
          - entity: ${'sensor.' + vars[0] + '_status'}
            state_not: unknown
          - entity: ${'sensor.' + vars[0] + '_status'}
            state_not: unavailable
          - entity: ${'sensor.' + vars[0] + '_status'}
            state: Inactive
        card:
          type: custom:snoozefest-entity-card
          entity: ${'text.' + vars[0] + '_duration'}
          read_only: false
          show_days: false
          show_seconds: true
          autosave: true
          color: var(--primary-text-color)
          font_size: 5
          separator_mode: units
          suffix_font_size: 0.2em
          suffix_opacity: 0.5
          suffix_padding: 0px 0px 0px 0px
          suffix_color: var(--secondary-text-color)
          card_border: false
          padding_top: 20px
          padding_bottom: 20px
          padding_left: 28px
          padding_right: 20px
          input_width: 1.2em
          show_steppers: true
          stepper_color: var(--secondary-text-color)
          stepper_opacity: 0.5
          stepper_active_opacity: 0.9
          stepper_size: 2em
          stepper_hit_height: 6em
          stepper_input_pad_y: 0.8em
          stepper_offset: 0.2em
          stepper_stroke: 0.16em
          pending_write_ms: 700
          input_background: rgba(1,1,1,0.1)
          input_border_radius: 0.2em
          input_padding: 0.18em
          content_justify: center
      - type: conditional
        conditions:
          - entity: ${'sensor.' + vars[0] + '_status'}
            state_not: ""
          - entity: ${'sensor.' + vars[0] + '_status'}
            state_not: unknown
          - entity: ${'sensor.' + vars[0] + '_status'}
            state_not: unavailable
        card:
          type: grid
          columns: 5
          square: false
          cards:
          - type: conditional
            conditions:
              - entity: ${'sensor.' + vars[0] + '_status'}
                state: Inactive
            card:
              type: custom:button-card
              name: Add Time
              icon: mdi:plus
              tap_action:
                action: none
              hold_action:
                action: none
              double_tap_action:
                action: none
              styles:
                card:
                  - opacity: 0.4
                name:
                  - color: var(--primary-text-color)
                  - font-size: 0.8em
                  - padding: 3px
                icon:
                  - color: var(--primary-text-color)
                  - padding: 2px
          - type: conditional
            conditions:
              - entity: ${'sensor.' + vars[0] + '_status'}
                state_not: Inactive
            card:
              type: custom:button-card
              name: Add Time
              icon: mdi:plus
              entity: ${'button.' + vars[0] + '_add_time'}
              tap_action:
                action: call-service
                service: button.press
                data:
                  entity_id: ${'button.' + vars[0] + '_add_time'}
              styles:
                card:
                  - opacity: 1
                name:
                  - color: var(--primary-text-color)
                  - font-size: 0.8em
                  - padding: 3px
                icon:
                  - color: var(--primary-text-color)
                  - padding: 2px
          - type: conditional
            conditions:
              - entity: ${'sensor.' + vars[0] + '_status'}
                state: Inactive
            card:
              type: custom:button-card
              name: Dismiss
              icon: mdi:timer-off-outline
              tap_action:
                action: none
              hold_action:
                action: none
              double_tap_action:
                action: none
              styles:
                card:
                  - opacity: 0.4
                name:
                  - color: var(--primary-text-color)
                  - font-size: 0.8em
                  - padding: 3px
                icon:
                  - color: var(--primary-text-color)
                  - padding: 2px
          - type: conditional
            conditions:
              - entity: ${'sensor.' + vars[0] + '_status'}
                state_not: Inactive
            card:
              type: custom:button-card
              name: Dismiss
              icon: mdi:timer-off-outline
              entity: ${'button.' + vars[0] + '_dismiss'}
              tap_action:
                action: javascript
                javascript: |
                  [[[ 
                    (async () => {
                      const h = hass;
                      const target = entity?.entity_id || '';
                      try {
                        if (!target) {
                          return;
                        }
                        await h.callService('button', 'press', {
                          entity_id: target,
                        });
                      } finally {
                        await h.callService('text', 'set_value', {
                          entity_id: 'text.snoozefest_manager_selected_timer_id',
                          value: '',
                        });
                      }
                    })();
                  ]]]
              styles:
                card:
                  - opacity: 1
                name:
                  - color: var(--primary-text-color)
                  - font-size: 0.8em
                  - padding: 3px
                icon:
                  - color: var(--primary-text-color)
                  - padding: 2px
          - type: conditional
            conditions:
              - entity: ${'sensor.' + vars[0] + '_status'}
                state: Active
            card:
              type: custom:button-card
              name: Pause
              icon: mdi:pause
              entity: ${'button.' + vars[0] + '_pause'}
              tap_action:
                action: call-service
                service: button.press
                data:
                  entity_id: ${'button.' + vars[0] + '_pause'}
              styles:
                card:
                  - opacity: 1
                name:
                  - color: var(--primary-text-color)
                  - font-size: 0.8em
                  - padding: 3px
                icon:
                  - color: var(--primary-text-color)
                  - padding: 2px
          - type: conditional
            conditions:
              - entity: ${'sensor.' + vars[0] + '_status'}
                state: Paused
            card:
              type: custom:button-card
              name: Resume
              icon: mdi:play-pause
              entity: ${'button.' + vars[0] + '_resume'}
              tap_action:
                action: call-service
                service: button.press
                data:
                  entity_id: ${'button.' + vars[0] + '_resume'}
              styles:
                card:
                  - opacity: 1
                name:
                  - color: var(--primary-text-color)
                  - font-size: 0.8em
                  - padding: 3px
                icon:
                  - color: var(--primary-text-color)
                  - padding: 2px
          - type: conditional
            conditions:
              - entity: ${'sensor.' + vars[0] + '_status'}
                state_not: Active
              - entity: ${'sensor.' + vars[0] + '_status'}
                state_not: Paused
            card:
              type: custom:button-card
              name: Pause
              icon: mdi:pause
              tap_action:
                action: none
              hold_action:
                action: none
              double_tap_action:
                action: none
              styles:
                card:
                  - opacity: 0.4
                name:
                  - color: var(--primary-text-color)
                  - font-size: 0.8em
                  - padding: 3px
                icon:
                  - color: var(--primary-text-color)
                  - padding: 2px
          - type: conditional
            conditions:
              - entity: ${'sensor.' + vars[0] + '_status'}
                state: Inactive
              - entity: ${'text.' + vars[0] + '_duration'}
                state_not: "00:00:00:00"
            card:
              type: custom:button-card
              name: Start
              icon: mdi:play
              entity: ${'button.' + vars[0] + '_activate'}
              tap_action:
                action: call-service
                service: button.press
                data:
                  entity_id: ${'button.' + vars[0] + '_activate'}
              styles:
                name:
                  - color: var(--primary-text-color)
                  - font-size: 0.8em
                  - padding: 3px
                icon:
                  - color: var(--primary-text-color)
                  - padding: 2px
          - type: conditional
            conditions:
              - entity: ${'sensor.' + vars[0] + '_status'}
                state_not: Inactive
              - entity: ${'text.' + vars[0] + '_duration'}
                state_not: "00:00:00:00"
            card:
              type: custom:button-card
              name: Reset
              icon: mdi:restore
              entity: ${'button.' + vars[0] + '_reset'}
              tap_action:
                action: call-service
                service: button.press
                data:
                  entity_id: ${'button.' + vars[0] + '_reset'}
              styles:
                name:
                  - color: var(--primary-text-color)
                  - font-size: 0.8em
                  - padding: 3px
                icon:
                  - color: var(--primary-text-color)
                  - padding: 2px
          - type: conditional
            conditions:
              - entity: ${'text.' + vars[0] + '_duration'}
                state: "00:00:00:00"
            card:
              type: custom:button-card
              name: Start
              icon: mdi:play
              tap_action:
                action: none
              hold_action:
                action: none
              double_tap_action:
                action: none
              styles:
                card:
                  - opacity: 0.4
                name:
                  - color: var(--primary-text-color)
                  - font-size: 0.8em
                  - padding: 3px
                icon:
                  - color: var(--primary-text-color)
                  - padding: 2px
          - type: conditional
            conditions:
              - entity: ${'text.' + vars[0] + '_duration'}
                state: "00:00:00:00"
            card:
              type: custom:button-card
              name: Cancel
              icon: mdi:close-circle-outline
              entity: ${'button.' + vars[0] + '_remove'}
              tap_action:
                action: javascript
                javascript: |
                  [[[ 
                    (async () => {
                      const h = hass;
                      const target = entity?.entity_id || '';
                      try {
                        if (!target) {
                          return;
                        }
                        await h.callService('button', 'press', {
                          entity_id: target,
                        });
                      } finally {
                        await h.callService('text', 'set_value', {
                          entity_id: 'text.snoozefest_manager_selected_timer_id',
                          value: '',
                        });
                      }
                    })();
                  ]]]
              styles:
                name:
                  - color: var(--primary-text-color)
                  - font-size: 0.8em
                  - padding: 3px
                icon:
                  - color: var(--primary-text-color)
                  - padding: 2px
          - type: conditional
            conditions:
              - entity: ${'text.' + vars[0] + '_duration'}
                state_not: "00:00:00:00"
            card:
              type: custom:button-card
              name: Save
              icon: mdi:check
              tap_action:
                action: call-service
                service: text.set_value
                data:
                  entity_id: text.snoozefest_manager_selected_timer_id
                  value: ""
              styles:
                name:
                  - color: var(--primary-text-color)
                  - font-size: 0.8em
                  - padding: 3px
                icon:
                  - color: var(--primary-text-color)
                  - padding: 2px
