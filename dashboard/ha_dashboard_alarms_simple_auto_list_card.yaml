                .map((eid) => parseInt(eid.match(/alarm_(\d+)$/)?.[1] || '', 10))
                .filter((n) => Number.isInteger(n) && n > 0 && n <= 12);
              return usedIds.length >= 12 ? 'Maximum alarms reached (12)' : '';
            ]]]
          color_type: card
          styles:
            card:
              - min-height: 80px
              - background: |
                  [[[ 
                    const rawEnv = states['input_text.snoozefest_env']?.state;
