type: conditional
conditions:
  - condition: or
    conditions:
      - condition: state
        entity: input_text.snoozefest_alarm_id
        state: ""
      - condition: not
        conditions:
          - condition: numeric_state
            entity: input_text.snoozefest_alarm_id
            above: 0
card:
  type: vertical-stack
  cards:
    - type: heading
      heading: Alarms
    - type: conditional
      conditions:
        - entity: input_text.snoozefest_env
          state: snoozefest_dev
      card:
        type: custom:auto-entities
        card:
          type: vertical-stack
        card_param: cards
        filter:
          include:
            - entity_id: /^switch\.snoozefest_dev_alarm_\d+$/
              sort:
                method: entity_id
              options:
                type: custom:button-card
                entity: this.entity_id
                triggers_update: all
                show_icon: false
                show_name: true
                show_label: true
                show_state: false
                hidden: |
                  [[[ 
                    const eid = entity?.entity_id || '';
                    const base = eid.replace(/^switch\./, '');
                    const status = String(states['sensor.' + base + '_status']?.state || '').toLowerCase();
                    return !(status === 'ringing' || status === 'snoozed');
                  ]]]
                name: |
                  [[[ 
                    const eid = entity?.entity_id || '';
                    if (!eid) return '--:--';
                    const base = eid.replace(/^switch\./, '');
                    const status = String(states['sensor.' + base + '_status']?.state || '').toLowerCase();
                    if (status === 'snoozed') {
                      const remainingId = 'sensor.' + base + '_remaining';
                      const rawRemaining = String(states[remainingId]?.state || '--:--').trim();
                      let dd = 0, hh = 0, mm = 0, ss = 0;
                      if (/^\d{2}:\d{2}:\d{2}:\d{2}$/.test(rawRemaining)) {
                        [dd, hh, mm, ss] = rawRemaining.split(':').map((n) => Number(n));
                      } else if (/^\d{2}:\d{2}:\d{2}$/.test(rawRemaining)) {
                        [hh, mm, ss] = rawRemaining.split(':').map((n) => Number(n));
                      } else if (/^\d{2}:\d{2}$/.test(rawRemaining)) {
                        [mm, ss] = rawRemaining.split(':').map((n) => Number(n));
                      } else {
                        return rawRemaining;
                      }
                      let out = '';
                      if (dd > 0) out += `${dd}d`;
                      if (hh > 0 || dd > 0) out += `${hh}h`;
                      if (mm > 0 || hh > 0 || dd > 0) out += `${mm}m`;
                      out += `${ss}s`;
                      return out;
                    }
                    const timeId = 'text.' + base + '_time';
                    const raw = String(states[timeId]?.state || '--:--');
                    return raw.replace(/^(\d{1,2}:\d{2}):\d{2}$/, '$1');
                  ]]]
                label: |
                  [[[ 
                    const eid = entity?.entity_id || '';
                    if (!eid) return '--';
                    const base = eid.replace(/^switch\./, '');
                    const dayId = 'sensor.' + base + '_next_day';
                    const dayNames = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
                    const selectedDays = dayNames.filter((_, index) => {
                      return states['switch.' + base + '_weekday_' + index]?.state === 'on';
                    });
                    if (selectedDays.length > 0 && selectedDays.length < 7) {
                      return selectedDays.join(' ');
                    }
                    return states[dayId]?.state || 'Unscheduled';
                  ]]]
                color_type: card
                styles:
                  card:
                    - padding: 16px 18px
                    - padding-bottom: 20px
                    - background: |
                        [[[ 
                          const eid = entity?.entity_id || '';
                          if (!eid) {
                            return 'var(--ha-card-background, var(--card-background-color, var(--secondary-background-color)))';
                          }
                          const base = eid.replace(/^switch\./, '');
                          const status = String(states['sensor.' + base + '_status']?.state || '').toLowerCase();
                          if (status === 'ringing') return 'rgba(220, 53, 69, 0.18)';
                          if (status === 'snoozed') return 'rgba(255, 193, 7, 0.18)';
                          if (status === 'active') return 'rgba(40, 167, 69, 0.18)';
                          return 'var(--ha-card-background, var(--card-background-color, var(--secondary-background-color)))';
                        ]]]
                    - box-shadow: none
                    - min-height: 84px
                  grid:
                    - grid-template-areas: "\"l\" \"n\""
                    - grid-template-columns: 1fr
                    - grid-template-rows: min-content min-content
                    - row-gap: 8px
                  label:
                    - justify-self: start
                    - align-self: end
                    - text-align: left
                    - font-size: 0.8rem
                    - color: var(--secondary-text-color)
                    - padding: 0
                  name:
                    - justify-self: start
                    - align-self: start
                    - text-align: left
                    - font-size: 2.5rem
                    - line-height: 1
                    - font-weight: 600
                    - padding: 0
                tap_action:
                  action: call-service
                  service: input_text.set_value
                  data:
                    entity_id: input_text.snoozefest_alarm_id
                    value: |
                      [[[ 
                        const eid = entity?.entity_id || '';
                        return eid.match(/alarm_(\d+)$/)?.[1] || '';
                      ]]]
                hold_action:
                  action: toggle
