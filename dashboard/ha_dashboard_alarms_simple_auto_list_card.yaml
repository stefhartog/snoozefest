              - font-weight: 600
            label:
              - color: var(--secondary-text-color)
              - font-size: 0.8rem
              - padding-top: 6px
          tap_action:
            action: javascript
            javascript: |
              [[[ 
                (async () => {
                  const hass = this._hass;
                  const rawEnv = hass.states['input_text.snoozefest_env']?.state;
                  const env = rawEnv && rawEnv !== 'unknown' && rawEnv !== 'unavailable'
                    ? rawEnv
                    : 'snoozefest';

                  const usedIds = Object.keys(hass.states)
                    .filter((eid) => new RegExp(`^switch\\.${env}_alarm_\\d+$`).test(eid))
                    .map((eid) => parseInt(eid.match(/alarm_(\d+)$/)?.[1] || '', 10))
                    .filter((n) => Number.isInteger(n) && n > 0 && n <= 12);

                  if (usedIds.length >= 12) {
                    helpers.toastMessage('Maximum alarms reached (12)');
                    return;
                  }

                  let nextId = null;
                  for (let i = 1; i <= 12; i += 1) {
                    if (!usedIds.includes(i)) {
                      nextId = i;
                      break;
                    }
                  }

                  if (!nextId) {
                    helpers.toastMessage('No free alarm ID available');
                    return;
                  }

                  await hass.callService('button', 'press', {
                    entity_id: `button.${env}_manager_add_alarm`,
                  });

                  await new Promise((resolve) => setTimeout(resolve, 250));

                  await hass.callService('input_text', 'set_value', {
                    entity_id: 'input_text.snoozefest_alarm_id',
                    value: String(nextId),
                  });
                })();
              ]]]
