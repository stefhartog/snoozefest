visibility:
  - condition: state
    entity: input_text.snoozefest_alarm_id
    state: ""
type: vertical-stack
cards:
  - type: heading
    heading: Alarms
  - type: custom:auto-entities
    card:
      type: vertical-stack
    card_param: cards
    filter:
      include:
        - entity_id: /^sensor\.[a-z0-9_]+_alarm_\d+_remaining$/
          options:
            type: custom:snoozefest-entity-card
            entity: input_text.snoozefest_alarm_id
            display_entity: this.entity_id
            mqtt_prefix: snoozefest
            read_only: true
            show_days: false
            show_seconds: false
            separator_mode: colon
            autosave: false
            color: var(--primary-text-color)
            font_size: 5
            status_opacity_inactive: 0.4
            suffix_font_size: 0.5em
            suffix_opacity: 0.5
            suffix_padding: 0px 0px 0px 0px
            suffix_color: var(--secondary-text-color)
            card_border: false
            padding_top: 12px
            padding_bottom: 12px
            padding_left: 20px
            padding_right: 20px
            stepper_offset: 0px
            stepper_size: 10px
            content_offset_x: 0px
            content_offset_y: 0px
            input_width: 1.2em
            show_steppers: false
            pending_write_ms: 700
            status_color_target: card
            status_color_default: var(--secondary-back-color)
            status_color_active: rgba(43, 71, 150,0.3)
            status_color_paused: rgba(44, 145, 132,0.3)
            status_color_snoozed: rgba(138, 128, 51,0.3)
            status_color_ringing: rgba(145, 50, 44,0.3)
            input_border_radius: 0.2em
            input_padding: 0
            content_justify: left
            tap_sets_timer_id: input_text.snoozefest_alarm_id
            hold_dismisses: true
            secondary_mode: weekday_smart
            secondary_anchor: card
            secondary_position: topleft
            secondary_align: center
            secondary_offset_x: 10px
            secondary_offset_y: 0px
            secondary_font_size: 0.2em
            secondary_opacity: "0.4"
            secondary_button: true
            secondary_button_icon_on: mdi:toggle-switch-outline
            secondary_button_icon_off: mdi:toggle-switch-off-outline
            secondary_button_icon_size: 50px
            secondary_button_icon_on_color: var(--secondary-text-color)
            secondary_button_icon_off_color: var(--secondary-text-color)
            secondary_button_icon_on_opacity: "0.8"
            secondary_button_icon_off_opacity: "0.3"
            secondary_button_anchor: card
            secondary_button_position: right
            secondary_button_align: center
            secondary_button_z_index: 2
            secondary_button_click_action: toggle_switch
            secondary_button_click_stop_propagation: true
  - type: grid
    columns: 3
    square: false
    cards:
      - type: custom:button-card
        color_type: blank-card
      - type: custom:button-card
        color_type: blank-card
      - type: custom:button-card
        show_icon: false
        show_name: true
        show_label: true
        triggers_update: all
        update_timer: 2
        name: |
          [[[ 
            const env = (window.SNOOZEFEST_PREFIX && String(window.SNOOZEFEST_PREFIX).trim()) || 'snoozefest';
            const statusIds = Object.keys(states)
              .filter((eid) => new RegExp(`^sensor\\.${env}_alarm_\\d+_status$`).test(eid))
              .map((eid) => parseInt(eid.match(/alarm_(\d+)_status$/)?.[1] || '', 10));
            const switchIds = Object.keys(states)
              .filter((eid) => new RegExp(`^switch\\.${env}_alarm_\\d+$`).test(eid))
              .map((eid) => parseInt(eid.match(/alarm_(\d+)$/)?.[1] || '', 10));
            const usedIds = [...new Set([...statusIds, ...switchIds])]
              .filter((n) => Number.isInteger(n) && n > 0 && n <= 12);
            return usedIds.length >= 12 ? 'Max' : '+';
          ]]]
        label: |
          [[[ 
            const env = (window.SNOOZEFEST_PREFIX && String(window.SNOOZEFEST_PREFIX).trim()) || 'snoozefest';
            const statusIds = Object.keys(states)
              .filter((eid) => new RegExp(`^sensor\\.${env}_alarm_\\d+_status$`).test(eid))
              .map((eid) => parseInt(eid.match(/alarm_(\d+)_status$/)?.[1] || '', 10));
            const switchIds = Object.keys(states)
              .filter((eid) => new RegExp(`^switch\\.${env}_alarm_\\d+$`).test(eid))
              .map((eid) => parseInt(eid.match(/alarm_(\d+)$/)?.[1] || '', 10));
            const usedIds = [...new Set([...statusIds, ...switchIds])]
              .filter((n) => Number.isInteger(n) && n > 0 && n <= 12);
            return usedIds.length >= 12 ? 'Maximum alarms reached (12)' : '';
          ]]]
        color_type: card
        styles:
          card:
            - min-height: 80px
            - background: |
                [[[ 
                  const env = (window.SNOOZEFEST_PREFIX && String(window.SNOOZEFEST_PREFIX).trim()) || 'snoozefest';
                  const statusIds = Object.keys(states)
                    .filter((eid) => new RegExp(`^sensor\\.${env}_alarm_\\d+_status$`).test(eid))
                    .map((eid) => parseInt(eid.match(/alarm_(\d+)_status$/)?.[1] || '', 10));
                  const switchIds = Object.keys(states)
                    .filter((eid) => new RegExp(`^switch\\.${env}_alarm_\\d+$`).test(eid))
                    .map((eid) => parseInt(eid.match(/alarm_(\d+)$/)?.[1] || '', 10));
                  const usedIds = [...new Set([...statusIds, ...switchIds])]
                    .filter((n) => Number.isInteger(n) && n > 0 && n <= 12);
                  return usedIds.length >= 12
                    ? 'color-mix(in srgb, var(--disabled-text-color) 20%, transparent)'
                    : 'color-mix(in srgb, rgba(31, 143, 61,0.6), transparent)';
                ]]]
            - opacity: |
                [[[ 
                  const env = (window.SNOOZEFEST_PREFIX && String(window.SNOOZEFEST_PREFIX).trim()) || 'snoozefest';
                  const statusIds = Object.keys(states)
                    .filter((eid) => new RegExp(`^sensor\\.${env}_alarm_\\d+_status$`).test(eid))
                    .map((eid) => parseInt(eid.match(/alarm_(\d+)_status$/)?.[1] || '', 10));
                  const switchIds = Object.keys(states)
                    .filter((eid) => new RegExp(`^switch\\.${env}_alarm_\\d+$`).test(eid))
                    .map((eid) => parseInt(eid.match(/alarm_(\d+)$/)?.[1] || '', 10));
                  const usedIds = [...new Set([...statusIds, ...switchIds])]
                    .filter((n) => Number.isInteger(n) && n > 0 && n <= 12);
                  return usedIds.length >= 12 ? '0.65' : '1';
                ]]]
          name:
            - color: |
                [[[ 
                  const env = (window.SNOOZEFEST_PREFIX && String(window.SNOOZEFEST_PREFIX).trim()) || 'snoozefest';
                  const statusIds = Object.keys(states)
                    .filter((eid) => new RegExp(`^sensor\\.${env}_alarm_\\d+_status$`).test(eid))
                    .map((eid) => parseInt(eid.match(/alarm_(\d+)_status$/)?.[1] || '', 10));
                  const switchIds = Object.keys(states)
                    .filter((eid) => new RegExp(`^switch\\.${env}_alarm_\\d+$`).test(eid))
                    .map((eid) => parseInt(eid.match(/alarm_(\d+)$/)?.[1] || '', 10));
                  const usedIds = [...new Set([...statusIds, ...switchIds])]
                    .filter((n) => Number.isInteger(n) && n > 0 && n <= 12);
                  return usedIds.length >= 12 ? 'var(--disabled-text-color)' : 'rgba(31, 143, 61,0.6)';
                ]]]
            - font-size: |
                [[[ 
                  const env = (window.SNOOZEFEST_PREFIX && String(window.SNOOZEFEST_PREFIX).trim()) || 'snoozefest';
                  const statusIds = Object.keys(states)
                    .filter((eid) => new RegExp(`^sensor\\.${env}_alarm_\\d+_status$`).test(eid))
                    .map((eid) => parseInt(eid.match(/alarm_(\d+)_status$/)?.[1] || '', 10));
                  const switchIds = Object.keys(states)
                    .filter((eid) => new RegExp(`^switch\\.${env}_alarm_\\d+$`).test(eid))
                    .map((eid) => parseInt(eid.match(/alarm_(\d+)$/)?.[1] || '', 10));
                  const usedIds = [...new Set([...statusIds, ...switchIds])]
                    .filter((n) => Number.isInteger(n) && n > 0 && n <= 12);
                  return usedIds.length >= 12 ? '1.4rem' : '3rem';
                ]]]
            - line-height: 1
            - font-weight: 600
          label:
            - color: var(--secondary-text-color)
            - font-size: 0.8rem
            - padding-top: 6px
        tap_action:
          action: javascript
          javascript: |
            [[[ 
              (async () => {
                const hass = this._hass;
                const getHass = () => this._hass || hass;
                const env = (window.SNOOZEFEST_PREFIX && String(window.SNOOZEFEST_PREFIX).trim()) || 'snoozefest';
                const managerAddButton = `button.${env}_manager_add_alarm`;

                if (!hass.states[managerAddButton]) {
                  helpers.toastMessage(`Add button not found for prefix: ${env}`);
                  return;
                }

                const statusIds = Object.keys(hass.states)
                  .filter((eid) => new RegExp(`^sensor\\.${env}_alarm_\\d+_status$`).test(eid))
                  .map((eid) => parseInt(eid.match(/alarm_(\d+)_status$/)?.[1] || '', 10));
                const switchIds = Object.keys(hass.states)
                  .filter((eid) => new RegExp(`^switch\\.${env}_alarm_\\d+$`).test(eid))
                  .map((eid) => parseInt(eid.match(/alarm_(\d+)$/)?.[1] || '', 10));
                const usedIds = [...new Set([...statusIds, ...switchIds])]
                  .filter((n) => Number.isInteger(n) && n > 0 && n <= 12);

                if (usedIds.length >= 12) {
                  helpers.toastMessage('Maximum alarms reached (12)');
                  return;
                }

                let nextId = null;
                for (let i = 1; i <= 12; i += 1) {
                  if (!usedIds.includes(i)) {
                    nextId = i;
                    break;
                  }
                }

                if (!nextId) {
                  helpers.toastMessage('No free alarm ID available');
                  return;
                }

                await hass.callService('button', 'press', {
                  entity_id: managerAddButton,
                });

                const targetStatus = `sensor.${env}_alarm_${nextId}_status`;
                const targetSwitch = `switch.${env}_alarm_${nextId}`;
                let created = false;
                for (let i = 0; i < 12; i += 1) {
                  await new Promise((resolve) => setTimeout(resolve, 150));
                  const currentHass = getHass();
                  if (currentHass?.states[targetStatus] || currentHass?.states[targetSwitch]) {
                    created = true;
                    break;
                  }
                }

                if (!created) {
                  helpers.toastMessage(`Alarm ${nextId} was not created`);
                  return;
                }

                await getHass().callService('input_text', 'set_value', {
                  entity_id: 'input_text.snoozefest_alarm_id',
                  value: String(nextId),
                });
              })();
            ]]]
