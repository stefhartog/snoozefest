      - type: conditional
        conditions:
          - entity: ${'sensor.' + vars[0] + '_status'}
            state_not: ""
          - entity: ${'sensor.' + vars[0] + '_status'}
            state_not: unknown
          - entity: ${'sensor.' + vars[0] + '_status'}
            state_not: unavailable
        card:
          type: grid
          columns: 4
          square: false
          cards:
          - type: conditional
            conditions:
              - entity: ${'sensor.' + vars[0] + '_status'}
                state: Ringing
            card:
              type: custom:button-card
              name: Snooze
              icon: mdi:alarm-snooze
              entity: ${'button.' + vars[0] + '_snooze'}
              tap_action:
                action: call-service
                service: button.press
                data:
                  entity_id: ${'button.' + vars[0] + '_snooze'}
              styles:
                card:
                  - opacity: 1
                name:
                  - color: var(--primary-text-color)
                  - font-size: 0.8em
                  - padding: 6px
                icon:
                  - color: var(--primary-text-color)
                  - padding: 6px
          - type: conditional
            conditions:
              - entity: ${'sensor.' + vars[0] + '_status'}
                state_not: Ringing
            card:
              type: custom:button-card
              name: Snooze
              icon: mdi:alarm-snooze
              tap_action:
                action: none
              hold_action:
                action: none
              double_tap_action:
                action: none
              styles:
