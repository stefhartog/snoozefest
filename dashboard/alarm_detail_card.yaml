                    - background: var(--ha-card-background)
                    - box-shadow: inset 0px 0px 0px 1px rgba(255, 255, 255, 0.07)
                  name:
                    - color: var(--secondary-text-color)
          - type: custom:button-card
            entity: ${'switch.' + vars[0] + '_weekday_2'}
            color_type: card
            name: Wed
            show_icon: false
            tap_action:
              action: toggle
            styles:
              card:
                - box-shadow: inset 0 0 0 1px var(--primary-background-color)
                - border-radius: 16px
              name:
                - color: rgba(99, 99, 99, 0.8)
                - font-size: 0.8em
                - padding: 6px
            state:
              - value: 'on'
                styles:
                  card:
                    - background: var(--ha-card-background)
                    - box-shadow: inset 0px 0px 0px 1px rgba(255, 255, 255, 0.07)
                  name:
                    - color: var(--secondary-text-color)
          - type: custom:button-card
            entity: ${'switch.' + vars[0] + '_weekday_3'}
            color_type: card
            name: Thu
            show_icon: false
            tap_action:
              action: toggle
            styles:
              card:
                - box-shadow: inset 0 0 0 1px var(--primary-background-color)
                - border-radius: 16px
              name:
                - color: rgba(99, 99, 99, 0.8)
                - font-size: 0.8em
                - padding: 6px
            state:
              - value: 'on'
                styles:
                  card:
                    - background: var(--ha-card-background)
                    - box-shadow: inset 0px 0px 0px 1px rgba(255, 255, 255, 0.07)
                  name:
                    - color: var(--secondary-text-color)
          - type: custom:button-card
            entity: ${'switch.' + vars[0] + '_weekday_4'}
            color_type: card
            name: Fri
            show_icon: false
            tap_action:
              action: toggle
            styles:
              card:
                - box-shadow: inset 0 0 0 1px var(--primary-background-color)
                - border-radius: 16px
              name:
                - color: rgba(99, 99, 99, 0.8)
                - font-size: 0.8em
                - padding: 6px
            state:
              - value: 'on'
                styles:
                  card:
                    - background: var(--ha-card-background)
                    - box-shadow: inset 0px 0px 0px 1px rgba(255, 255, 255, 0.07)
                  name:
                    - color: var(--secondary-text-color)
          - type: custom:button-card
            entity: ${'switch.' + vars[0] + '_weekday_5'}
            color_type: card
            name: Sat
            show_icon: false
            tap_action:
              action: toggle
            styles:
              card:
                - box-shadow: inset 0 0 0 1px var(--primary-background-color)
                - border-radius: 16px
              name:
                - color: rgba(99, 99, 99, 0.8)
                - font-size: 0.8em
                - padding: 6px
            state:
              - value: 'on'
                styles:
                  card:
                    - background: var(--ha-card-background)
                    - box-shadow: inset 0px 0px 0px 1px rgba(255, 255, 255, 0.07)
                  name:
                    - color: var(--secondary-text-color)
          - type: custom:button-card
            entity: ${'switch.' + vars[0] + '_weekday_6'}
            color_type: card
            name: Sun
            show_icon: false
            tap_action:
              action: toggle
            styles:
              card:
                - box-shadow: inset 0 0 0 1px var(--primary-background-color)
                - border-radius: 16px
              name:
                - color: rgba(99, 99, 99, 0.8)
