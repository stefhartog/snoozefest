                  - padding: 6px
          - type: custom:button-card
            name: Remove
            icon: mdi:delete
            entity: ${'button.' + vars[0] + '_remove'}
            tap_action:
              action: multi-actions
              actions:
                - action: call-service
                  service: button.press
                  data:
                    entity_id: ${'button.' + vars[0] + '_remove'}
                - action: call-service
                  service: input_text.set_value
                  data:
                    entity_id: input_text.snoozefest_alarm_id
                    value: ""
            styles:
              name:
                - color: var(--primary-text-color)
                - font-size: 0.8em
                - padding: 6px
              icon:
                - color: var(--primary-text-color)
                - padding: 6px
          - type: custom:button-card
            name: Save
            icon: mdi:check
            tap_action:
              action: call-service
              service: input_text.set_value
              data:
                entity_id: input_text.snoozefest_alarm_id
                value: ""
            styles:
              name:
                - color: var(--primary-text-color)
                - font-size: 0.8em
                - padding: 6px
              icon:
                - color: var(--primary-text-color)
                - padding: 6px
