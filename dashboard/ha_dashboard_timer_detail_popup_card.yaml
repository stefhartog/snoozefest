type: conditional
conditions:
  - entity: input_text.snoozefest_timer_id
    state_not: ""
  - entity: input_text.snoozefest_timer_id
    state_not: unknown
  - entity: input_text.snoozefest_timer_id
    state_not: unavailable
card:
  type: custom:config-template-card
  variables:
    - |-
      (function () {
        var rawId = states['input_text.snoozefest_timer_id'] && states['input_text.snoozefest_timer_id'].state
          ? String(states['input_text.snoozefest_timer_id'].state).trim()
          : '';
        if (!rawId || rawId === 'unknown' || rawId === 'unavailable') {
          return '';
        }

        var env = (window.SNOOZEFEST_PREFIX && String(window.SNOOZEFEST_PREFIX).trim()) || 'snoozefest';
        return env + '_timer_' + rawId;
      })()
  entities:
    - input_text.snoozefest_timer_id
    - ${'text.' + vars[0] + '_duration'}
    - ${'text.' + vars[0] + '_label'}
    - ${'sensor.' + vars[0] + '_status'}
    - ${'sensor.' + vars[0] + '_remaining'}
    - ${'sensor.' + vars[0] + '_remaining_friendly'}
    - ${'button.' + vars[0] + '_add_time'}
    - ${'button.' + vars[0] + '_pause'}
    - ${'button.' + vars[0] + '_resume'}
    - ${'button.' + vars[0] + '_activate'}
    - ${'button.' + vars[0] + '_remove'}
    - ${'button.' + vars[0] + '_dismiss'}
  card:
    type: vertical-stack
    cards:
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:lovelace-multiline-text-input-card
            autosave: true
            entity: ${'text.' + vars[0] + '_label'}
            max_length: 12
            min_length: 0
            placeholder_text: ${'Timer ' + states['input_text.snoozefest_timer_id'].state}
            show_success_messages: false
            title: false
            buttons: false
            color: var(--primary-text-color)
            font_size: 1
            card_border: false
            card_background: transparent
            padding: null
            padding_left: 2
            padding_top: 4
          - type: custom:button-card
            entity: ${'sensor.' + vars[0] + '_status'}
            show_name: false
            show_icon: false
            show_state: true
            state_display: |-
              ${(() => {
                const statusEntity = 'sensor.' + vars[0] + '_status';
                const remainingFriendlyEntity = 'sensor.' + vars[0] + '_remaining_friendly';
                const remainingEntity = 'sensor.' + vars[0] + '_remaining';
                const status = states[statusEntity] && states[statusEntity].state ? states[statusEntity].state : '';
                const statusLower = String(status).toLowerCase();
                const remainingFriendly = states[remainingFriendlyEntity] && states[remainingFriendlyEntity].state && states[remainingFriendlyEntity].state !== 'unknown' && states[remainingFriendlyEntity].state !== 'unavailable'
                  ? states[remainingFriendlyEntity].state
                  : '';
                const remaining = states[remainingEntity] && states[remainingEntity].state && states[remainingEntity].state !== 'unknown' && states[remainingEntity].state !== 'unavailable'
                  ? states[remainingEntity].state
                  : '';
                if (statusLower === 'active') {
                  return remainingFriendly || remaining || status;
                }
                if (statusLower === 'paused') {
                  return (remainingFriendly || remaining) ? ('Paused ' + (remainingFriendly || remaining)) : status;
                }
                return status;
              })()}
            color_type: card
            tap_action:
              action: none
            hold_action:
              action: none
            double_tap_action:
              action: none
            styles:
              card:
                - border: none
                - box-shadow: none
                - background: var(--primary-background-color)
                - padding: 0px
                - padding-top: 7px
                - padding-right: 5px
              state:
                - align-self: bottom
                - justify-self: end
                - font-size: 0.7em
                - color: rgba(255,255,255,0.2)
      - type: conditional
        conditions:
          - entity: ${'sensor.' + vars[0] + '_status'}
            state_not: Inactive
        card:
          type: custom:snoozefest-time-picker-card
          entity: ${'text.' + vars[0] + '_duration'}
          display_entity: ${'sensor.' + vars[0] + '_remaining'}
          read_only: true
          show_days: true
          show_seconds: true
          separator_mode: units
          autosave: false
          color: var(--primary-text-color)
          font_size: 2.5
          suffix_font_size: 0.5em
          suffix_opacity: 0.5
          suffix_padding: 10px 0px 0px 0px
          suffix_color: var(--secondary-text-color)
          card_border: false
          padding: 40px
          input_width: 1.2em
          show_steppers: true
          stepper_hit_height: 1.25em
          stepper_color: var(--secondary-text-color)
          stepper_opacity: 0.5
          stepper_active_opacity: 0.9
          stepper_input_pad_y: 0em
          stepper_offset: 1.4em
          stepper_size: 0.8em
          stepper_stroke: 0.12em
          pending_write_ms: 700
          status_color_target: input
          status_color_default: rgba(1,1,1,0.1)
          status_color_active: rgba(40,167,69,0.18)
          status_color_paused: rgba(255,193,7,0.18)
          status_color_ringing: rgba(220,53,69,0.18)
          input_border_radius: 0.2em
          input_padding: 0.4em
          content_justify: center
      - type: conditional
        conditions:
          - entity: ${'sensor.' + vars[0] + '_status'}
            state: Inactive
        card:
          type: custom:snoozefest-time-picker-card
          entity: ${'text.' + vars[0] + '_duration'}
          read_only: false
          show_days: true
          show_seconds: true
          separator_mode: units
          autosave: true
          color: var(--primary-text-color)
          font_size: 2.5
          suffix_font_size: 0.5em
          suffix_opacity: 0.5
          suffix_padding: 10px 0px 0px 0px
          suffix_color: var(--secondary-text-color)
          card_border: false
          padding: 40px
          input_width: 1.2em
          show_steppers: true
          stepper_hit_height: 1.25em
          stepper_color: var(--secondary-text-color)
          stepper_opacity: 0.5
          stepper_active_opacity: 0.9
          stepper_input_pad_y: 0em
          stepper_offset: 1.4em
          stepper_size: 0.8em
          stepper_stroke: 0.12em
          pending_write_ms: 700
          input_background: rgba(1,1,1,0.1)
          input_border_radius: 0.2em
          input_padding: 0.4em
          content_justify: center
      - type: grid
        columns: 5
        square: false
        cards:
          - type: conditional
            conditions:
              - entity: ${'sensor.' + vars[0] + '_status'}
                state: Inactive
            card:
              type: custom:button-card
              name: Add Time
              icon: mdi:plus
              tap_action:
                action: none
              hold_action:
                action: none
              double_tap_action:
                action: none
              styles:
                card:
                  - opacity: 0.4
                name:
                  - color: var(--primary-text-color)
                  - font-size: 0.8em
                  - padding: 3px
                icon:
                  - color: var(--primary-text-color)
                  - padding: 2px
          - type: conditional
            conditions:
              - entity: ${'sensor.' + vars[0] + '_status'}
                state_not: Inactive
            card:
              type: custom:button-card
              name: Add Time
              icon: mdi:plus
              entity: ${'button.' + vars[0] + '_add_time'}
              tap_action:
                action: call-service
                service: button.press
                data:
                  entity_id: ${'button.' + vars[0] + '_add_time'}
              styles:
                card:
                  - opacity: 1
                name:
                  - color: var(--primary-text-color)
                  - font-size: 0.8em
                  - padding: 3px
                icon:
                  - color: var(--primary-text-color)
                  - padding: 2px
          - type: conditional
            conditions:
              - entity: ${'sensor.' + vars[0] + '_status'}
                state: Inactive
            card:
              type: custom:button-card
              name: Dismiss
              icon: mdi:timer-off-outline
              tap_action:
                action: none
              hold_action:
                action: none
              double_tap_action:
                action: none
              styles:
                card:
                  - opacity: 0.4
                name:
                  - color: var(--primary-text-color)
                  - font-size: 0.8em
                  - padding: 3px
                icon:
                  - color: var(--primary-text-color)
                  - padding: 2px
          - type: conditional
            conditions:
              - entity: ${'sensor.' + vars[0] + '_status'}
                state_not: Inactive
            card:
              type: custom:button-card
              name: Dismiss
              icon: mdi:timer-off-outline
              entity: ${'button.' + vars[0] + '_dismiss'}
              tap_action:
                action: javascript
                javascript: |
                  [[[ 
                    (async () => {
                      const h = hass;
                      const target = entity?.entity_id || '';
                      try {
                        if (!target) {
                          return;
                        }
                        await h.callService('button', 'press', {
                          entity_id: target,
                        });
                      } finally {
                        await h.callService('input_text', 'set_value', {
                          entity_id: 'input_text.snoozefest_timer_id',
                          value: '',
                        });
                      }
                    })();
                  ]]]
              styles:
                card:
                  - opacity: 1
                name:
                  - color: var(--primary-text-color)
                  - font-size: 0.8em
                  - padding: 3px
                icon:
                  - color: var(--primary-text-color)
                  - padding: 2px
          - type: conditional
            conditions:
              - entity: ${'sensor.' + vars[0] + '_status'}
                state: Active
            card:
              type: custom:button-card
              name: Pause
              icon: mdi:pause
              entity: ${'button.' + vars[0] + '_pause'}
              tap_action:
                action: call-service
                service: button.press
                data:
                  entity_id: ${'button.' + vars[0] + '_pause'}
              styles:
                card:
                  - opacity: 1
                name:
                  - color: var(--primary-text-color)
                  - font-size: 0.8em
                  - padding: 3px
                icon:
                  - color: var(--primary-text-color)
                  - padding: 2px
          - type: conditional
            conditions:
              - entity: ${'sensor.' + vars[0] + '_status'}
                state: Paused
            card:
              type: custom:button-card
              name: Resume
              icon: mdi:play-pause
              entity: ${'button.' + vars[0] + '_resume'}
              tap_action:
                action: call-service
                service: button.press
                data:
                  entity_id: ${'button.' + vars[0] + '_resume'}
              styles:
                card:
                  - opacity: 1
                name:
                  - color: var(--primary-text-color)
                  - font-size: 0.8em
                  - padding: 3px
                icon:
                  - color: var(--primary-text-color)
                  - padding: 2px
          - type: conditional
            conditions:
              - entity: ${'sensor.' + vars[0] + '_status'}
                state_not: Active
              - entity: ${'sensor.' + vars[0] + '_status'}
                state_not: Paused
            card:
              type: custom:button-card
              name: Pause
              icon: mdi:pause
              tap_action:
                action: none
              hold_action:
                action: none
              double_tap_action:
                action: none
              styles:
                card:
                  - opacity: 0.4
                name:
                  - color: var(--primary-text-color)
                  - font-size: 0.8em
                  - padding: 3px
                icon:
                  - color: var(--primary-text-color)
                  - padding: 2px
          - type: conditional
            conditions:
              - entity: ${'text.' + vars[0] + '_duration'}
                state_not: "00:00:00:00"
            card:
              type: custom:button-card
              name: |-
                ${(() => {
                  const status = String(states['sensor.' + vars[0] + '_status']?.state || '').toLowerCase();
                  return (status === 'active' || status === 'ringing' || status === 'paused') ? 'Restart' : 'Start';
                })()}
              icon: |-
                ${(() => {
                  const status = String(states['sensor.' + vars[0] + '_status']?.state || '').toLowerCase();
                  return (status === 'active' || status === 'ringing' || status === 'paused') ? 'mdi:restart' : 'mdi:play';
                })()}
              entity: ${'button.' + vars[0] + '_activate'}
              tap_action:
                action: call-service
                service: button.press
                data:
                  entity_id: ${'button.' + vars[0] + '_activate'}
              styles:
                name:
                  - color: var(--primary-text-color)
                  - font-size: 0.8em
                  - padding: 3px
                icon:
                  - color: var(--primary-text-color)
                  - padding: 2px
          - type: conditional
            conditions:
              - entity: ${'text.' + vars[0] + '_duration'}
                state: "00:00:00:00"
            card:
              type: custom:button-card
              name: Start
              icon: mdi:play
              tap_action:
                action: none
              hold_action:
                action: none
              double_tap_action:
                action: none
              styles:
                card:
                  - opacity: 0.4
                name:
                  - color: var(--primary-text-color)
                  - font-size: 0.8em
                  - padding: 3px
                icon:
                  - color: var(--primary-text-color)
                  - padding: 2px
          - type: conditional
            conditions:
              - entity: ${'text.' + vars[0] + '_duration'}
                state: "00:00:00:00"
            card:
              type: custom:button-card
              name: Cancel
              icon: mdi:close-circle-outline
              entity: ${'button.' + vars[0] + '_remove'}
              tap_action:
                action: javascript
                javascript: |
                  [[[ 
                    (async () => {
                      const h = hass;
                      const target = entity?.entity_id || '';
                      try {
                        if (!target) {
                          return;
                        }
                        await h.callService('button', 'press', {
                          entity_id: target,
                        });
                      } finally {
                        await h.callService('input_text', 'set_value', {
                          entity_id: 'input_text.snoozefest_timer_id',
                          value: '',
                        });
                      }
                    })();
                  ]]]
              styles:
                name:
                  - color: var(--primary-text-color)
                  - font-size: 0.8em
                  - padding: 3px
                icon:
                  - color: var(--primary-text-color)
                  - padding: 2px
          - type: conditional
            conditions:
              - entity: ${'text.' + vars[0] + '_duration'}
                state_not: "00:00:00:00"
            card:
              type: custom:button-card
              name: Back
              icon: mdi:arrow-left
              tap_action:
                action: call-service
                service: input_text.set_value
                data:
                  entity_id: input_text.snoozefest_timer_id
                  value: ""
              styles:
                name:
                  - color: var(--primary-text-color)
                  - font-size: 0.8em
                  - padding: 3px
                icon:
                  - color: var(--primary-text-color)
                  - padding: 2px
