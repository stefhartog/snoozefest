type: conditional
conditions:
  - entity: input_text.snoozefest_alarm_id
    state_not: ""
  - entity: input_text.snoozefest_alarm_id
    state_not: unknown
  - entity: input_text.snoozefest_alarm_id
    state_not: unavailable
card:
  type: custom:config-template-card
  variables:
    - >-
      (((window.SNOOZEFEST_PREFIX && String(window.SNOOZEFEST_PREFIX).trim()) ||
      'snoozefest')) + '_alarm_' +
      states['input_text.snoozefest_alarm_id'].state
    - |-
      (function () {
        var labelKey = 'text.' + vars[0] + '_label';
        var label = (states[labelKey] && states[labelKey].state && states[labelKey].state !== 'unknown' && states[labelKey].state !== 'unavailable')
          ? states[labelKey].state
          : 'Alarm';
        return label;
      })()
    - |-
      (function () {
        var timeKey = 'text.' + vars[0] + '_time';
        var dayKey = 'sensor.' + vars[0] + '_next_day';
        var nextDay = (states[dayKey] && states[dayKey].state && states[dayKey].state !== 'unknown' && states[dayKey].state !== 'unavailable')
          ? states[dayKey].state
          : '';
        var setTime = (states[timeKey] && states[timeKey].state && states[timeKey].state !== 'unknown' && states[timeKey].state !== 'unavailable')
          ? states[timeKey].state
          : '--:--';
        return (nextDay ? nextDay + ' at ' : '') + setTime;
      })()
  entities:
    - input_text.snoozefest_alarm_id
    - ${'switch.' + vars[0]}
    - ${'text.' + vars[0] + '_time'}
    - ${'text.' + vars[0] + '_label'}
    - ${'switch.' + vars[0] + '_weekday_0'}
    - ${'switch.' + vars[0] + '_weekday_1'}
    - ${'switch.' + vars[0] + '_weekday_2'}
    - ${'switch.' + vars[0] + '_weekday_3'}
    - ${'switch.' + vars[0] + '_weekday_4'}
    - ${'switch.' + vars[0] + '_weekday_5'}
    - ${'switch.' + vars[0] + '_weekday_6'}
    - ${'sensor.' + vars[0] + '_status'}
    - ${'sensor.' + vars[0] + '_next_day'}
  card:
    type: vertical-stack
    cards:
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:lovelace-multiline-text-input-card
            autosave: true
            entity: ${'text.' + vars[0] + '_label'}
            max_length: 12
            min_length: 0
            placeholder_text: ${'Alarm ' + states['input_text.snoozefest_alarm_id'].state}
            show_success_messages: false
            title: false
            buttons: false
            color: var(--primary-text-color)
            font_size: 1
            card_border: false
            card_background: false
            padding: null
            padding_left: 2
            padding_top: 4
          - type: custom:button-card
            entity: ${'sensor.' + vars[0] + '_status'}
            show_name: false
            show_icon: false
            show_state: true
            state_display: |-
              ${(() => {
                const statusEntity = 'sensor.' + vars[0] + '_status';
                const nextDayEntity = 'sensor.' + vars[0] + '_next_day';
                const status = states[statusEntity] && states[statusEntity].state ? states[statusEntity].state : '';
                const nextDay = states[nextDayEntity] && states[nextDayEntity].state && states[nextDayEntity].state !== 'unknown' && states[nextDayEntity].state !== 'unavailable'
                  ? states[nextDayEntity].state
                  : '';
                return status === 'Active' && nextDay ? nextDay : status;
              })()}
            color_type: card
            tap_action:
              action: none
            hold_action:
              action: none
            double_tap_action:
              action: none
            styles:
              card:
                - border: none
                - background: none
                - box-shadow: none
                - padding: 0px
                - padding-top: 7px
                - padding-right: 5px
              state:
                - align-self: bottom
                - justify-self: end
                - font-size: 0.7em
                - color: rgba(255,255,255,0.2)
      - type: grid
        columns: 1
        square: false
        cards:
          - type: custom:snoozefest-time-picker-card
            entity: ${'text.' + vars[0] + '_time'}
            autosave: true
            color: var(--primary-text-color)
            font_size: 3.5
            suffix_font_size: 0.6em
            suffix_opacity: 0.5
            suffix_padding: 0px 0px 0px 0px
            suffix_color: var(--secondary-text-color)
            card_border: false
            padding: 50px
            padding_left_right: 10px
            input_width: 1.5em
            show_steppers: true
            stepper_hit_height: 1.25em
            stepper_color: var(--secondary-text-color)
            stepper_opacity: 0.5
            stepper_active_opacity: 0.9
            stepper_input_pad_y: 0em
            stepper_offset: 1.4em
            stepper_size: 0.8em
            stepper_stroke: 0.12em
            pending_write_ms: 700
            input_background: rgba(1,1,1,0.1)
            input_border_radius: 0.2em
            input_padding: 0.5em
            content_justify: center
      - type: horizontal-stack
        cards:
          - type: custom:button-card
            entity: ${'switch.' + vars[0] + '_weekday_0'}
            color_type: card
            name: Mon
            show_icon: false
            radius: 4px
            tap_action:
              action: toggle
            styles:
              name:
                - color: var(--primary-text-color)
                - font-size: 0.8em
                - padding: 6px
          - type: custom:button-card
            entity: ${'switch.' + vars[0] + '_weekday_1'}
            color_type: card
            name: Tue
            show_icon: false
            tap_action:
              action: toggle
            styles:
              name:
                - color: var(--primary-text-color)
                - font-size: 0.8em
                - padding: 6px
          - type: custom:button-card
            entity: ${'switch.' + vars[0] + '_weekday_2'}
            color_type: card
            name: Wed
            show_icon: false
            tap_action:
              action: toggle
            styles:
              name:
                - color: var(--primary-text-color)
                - font-size: 0.8em
                - padding: 6px
          - type: custom:button-card
            entity: ${'switch.' + vars[0] + '_weekday_3'}
            color_type: card
            name: Thu
            show_icon: false
            tap_action:
              action: toggle
            styles:
              name:
                - color: var(--primary-text-color)
                - font-size: 0.8em
                - padding: 6px
          - type: custom:button-card
            entity: ${'switch.' + vars[0] + '_weekday_4'}
            color_type: card
            name: Fri
            show_icon: false
            tap_action:
              action: toggle
            styles:
              name:
                - color: var(--primary-text-color)
                - font-size: 0.8em
                - padding: 6px
          - type: custom:button-card
            entity: ${'switch.' + vars[0] + '_weekday_5'}
            color_type: card
            name: Sat
            show_icon: false
            tap_action:
              action: toggle
            styles:
              name:
                - color: var(--primary-text-color)
                - font-size: 0.8em
                - padding: 6px
          - type: custom:button-card
            entity: ${'switch.' + vars[0] + '_weekday_6'}
            color_type: card
            name: Sun
            show_icon: false
            tap_action:
              action: toggle
            styles:
              name:
                - color: var(--primary-text-color)
                - font-size: 0.8em
                - padding: 6px
      - type: grid
        columns: 4
        square: false
        cards:
          - type: custom:button-card
            name: Snooze
            icon: mdi:alarm-snooze
            entity: ${'button.' + vars[0] + '_snooze'}
            tap_action:
              action: call-service
              service: button.press
              data:
                entity_id: ${'button.' + vars[0] + '_snooze'}
            styles:
              name:
                - color: var(--primary-text-color)
                - font-size: 0.8em
                - padding: 6px
              icon:
                - color: var(--primary-text-color)
                - padding: 6px
          - type: custom:button-card
            name: Dismiss
            icon: mdi:alarm-off
            entity: ${'button.' + vars[0] + '_dismiss'}
            tap_action:
              action: call-service
              service: button.press
              data:
                entity_id: ${'button.' + vars[0] + '_dismiss'}
            styles:
              name:
                - color: var(--primary-text-color)
                - font-size: 0.8em
                - padding: 6px
              icon:
                - color: var(--primary-text-color)
                - padding: 6px
          - type: custom:button-card
            name: Remove
            icon: mdi:delete
            entity: ${'button.' + vars[0] + '_remove'}
            tap_action:
              action: multi-actions
              actions:
                - action: call-service
                  service: button.press
                  data:
                    entity_id: ${'button.' + vars[0] + '_remove'}
                - action: call-service
                  service: input_text.set_value
                  data:
                    entity_id: input_text.snoozefest_alarm_id
                    value: ""
            styles:
              name:
                - color: var(--primary-text-color)
                - font-size: 0.8em
                - padding: 6px
              icon:
                - color: var(--primary-text-color)
                - padding: 6px
          - type: custom:button-card
            name: Done
            icon: mdi:check
            tap_action:
              action: call-service
              service: input_text.set_value
              data:
                entity_id: input_text.snoozefest_alarm_id
                value: ""
            styles:
              name:
                - color: var(--primary-text-color)
                - font-size: 0.8em
                - padding: 6px
              icon:
                - color: var(--primary-text-color)
                - padding: 6px
