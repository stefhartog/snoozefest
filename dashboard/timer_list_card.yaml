visibility:
  - condition: state
    entity: text.snoozefest_manager_selected_timer_id
    state: "0"
type: vertical-stack
cards:
  - type: heading
    heading: Timers
    heading_style: title
  - type: custom:auto-entities
    card:
      type: vertical-stack
    card_param: cards
    sort:
      method: entity_id
    filter:
      include:
        - entity_id: /^sensor\.[a-z0-9_]+_timer_\d+_remaining$/
          options:
            type: custom:snoozefest-entity-card
            entity: text.snoozefest_manager_selected_timer_id
            display_entity: this.entity_id
            mqtt_prefix: snoozefest
            read_only: true
            show_days: false
            show_seconds: true
            separator_mode: units
            autosave: false
            color: var(--primary-text-color)
            font_size: 4.5
            suffix_font_size: 0.2em
            suffix_opacity: 0.4
            suffix_padding: 20px 2px 0px 0px
            suffix_color: var(--secondary-text-color)
            card_border: false
            padding_top: 12px
            padding_bottom: 0px
            padding_left: 20px
            padding_right: 10px
            stepper_offset: 0px
            stepper_size: 10px
            content_offset_x: 0px
            content_offset_y: 0px
            content_justify: left
            input_width: 1.2em
            show_steppers: false
            pending_write_ms: 700
            status_color_target: card
            status_color_default: var(--secondary-back-color)
            status_color_active: rgba(43, 71, 150,0.3)
            status_color_paused: rgba(138, 128, 51,0.3)
            status_color_snoozed: rgba(138, 128, 51,0.3)
            status_color_ringing: rgba(145, 50, 44,0.3)
            input_border_radius: 0.2em
            tap_sets_timer_id: text.snoozefest_manager_selected_timer_id
            hold_dismisses: true
            secondary_mode: status
            secondary_anchor: card
            secondary_position: topleft
            secondary_align: center
            secondary_offset_x: 10px
            secondary_offset_y: 0px
            secondary_font_size: 0.2em
            secondary_opacity: "0.4"
            secondary_button: true
            secondary_button_icon_on: mdi:trash-can-outline
            secondary_button_icon_off: mdi:trash-can-outline
            secondary_button_icon_size: 30px
            secondary_button_icon_on_color: var(--secondary-text-color)
            secondary_button_icon_off_color: var(--secondary-text-color)
            secondary_button_icon_on_opacity: "0.6"
            secondary_button_icon_off_opacity: "0.6"
            secondary_button_icon_padding: 20px
            secondary_button_anchor: card
            secondary_button_position: right
            secondary_button_align: center
            secondary_button_z_index: 2
            secondary_button_click_action: remove
            secondary_button_click_stop_propagation: true
  - type: grid
    columns: 3
    square: false
    cards:
      - type: custom:button-card
        color_type: blank-card
      - type: custom:button-card
        color_type: blank-card
      - type: custom:button-card
        show_icon: false
        show_name: true
        show_label: true
        triggers_update: all
        update_timer: 2
        name: |
          [[[ 
            const env = (window.SNOOZEFEST_PREFIX && String(window.SNOOZEFEST_PREFIX).trim()) || 'snoozefest';
            const usedIds = Object.keys(states)
              .filter((eid) => new RegExp(`^sensor\\.${env}_timer_\\d+_status$`).test(eid))
              .map((eid) => parseInt(eid.match(/timer_(\d+)_status$/)?.[1] || '', 10))
              .filter((n) => Number.isInteger(n) && n > 0 && n <= 12);
            return usedIds.length >= 12 ? 'Max' : '+';
          ]]]
        label: |
          [[[ 
            const env = (window.SNOOZEFEST_PREFIX && String(window.SNOOZEFEST_PREFIX).trim()) || 'snoozefest';
            const usedIds = Object.keys(states)
              .filter((eid) => new RegExp(`^sensor\\.${env}_timer_\\d+_status$`).test(eid))
              .map((eid) => parseInt(eid.match(/timer_(\d+)_status$/)?.[1] || '', 10))
              .filter((n) => Number.isInteger(n) && n > 0 && n <= 12);
            return usedIds.length >= 12 ? 'Maximum timers reached (12)' : '';
          ]]]
        color_type: card
        styles:
          card:
            - min-height: 80px
            - background: |
                [[[ 
                  const env = (window.SNOOZEFEST_PREFIX && String(window.SNOOZEFEST_PREFIX).trim()) || 'snoozefest';
                  const usedIds = Object.keys(states)
                    .filter((eid) => new RegExp(`^sensor\\.${env}_timer_\\d+_status$`).test(eid))
                    .map((eid) => parseInt(eid.match(/timer_(\d+)_status$/)?.[1] || '', 10))
                    .filter((n) => Number.isInteger(n) && n > 0 && n <= 12);
                  return usedIds.length >= 12
                    ? 'color-mix(in srgb, var(--disabled-text-color) 20%, transparent)'
                    : 'color-mix(in srgb, var(--primary-color) 14%, transparent)';
                ]]]
            - opacity: |
                [[[ 
                  const env = (window.SNOOZEFEST_PREFIX && String(window.SNOOZEFEST_PREFIX).trim()) || 'snoozefest';
                  const usedIds = Object.keys(states)
                    .filter((eid) => new RegExp(`^sensor\\.${env}_timer_\\d+_status$`).test(eid))
                    .map((eid) => parseInt(eid.match(/timer_(\d+)_status$/)?.[1] || '', 10))
                    .filter((n) => Number.isInteger(n) && n > 0 && n <= 12);
                  return usedIds.length >= 12 ? '0.65' : '1';
                ]]]
          name:
            - color: |
                [[[ 
                  const env = (window.SNOOZEFEST_PREFIX && String(window.SNOOZEFEST_PREFIX).trim()) || 'snoozefest';
                  const usedIds = Object.keys(states)
                    .filter((eid) => new RegExp(`^sensor\\.${env}_timer_\\d+_status$`).test(eid))
                    .map((eid) => parseInt(eid.match(/timer_(\d+)_status$/)?.[1] || '', 10))
                    .filter((n) => Number.isInteger(n) && n > 0 && n <= 12);
                  return usedIds.length >= 12 ? 'var(--disabled-text-color)' : 'var(--primary-color)';
                ]]]
            - font-size: |
                [[[ 
                  const env = (window.SNOOZEFEST_PREFIX && String(window.SNOOZEFEST_PREFIX).trim()) || 'snoozefest';
                  const usedIds = Object.keys(states)
                    .filter((eid) => new RegExp(`^sensor\\.${env}_timer_\\d+_status$`).test(eid))
                    .map((eid) => parseInt(eid.match(/timer_(\d+)_status$/)?.[1] || '', 10))
                    .filter((n) => Number.isInteger(n) && n > 0 && n <= 12);
                  return usedIds.length >= 12 ? '1.4rem' : '3rem';
                ]]]
            - line-height: 1
            - font-weight: 600
          label:
            - color: var(--secondary-text-color)
            - font-size: 0.8rem
            - padding-top: 6px
        tap_action:
          action: javascript
          javascript: |
            [[[ 
              (async () => {
                const hass = this._hass;
                const env = (window.SNOOZEFEST_PREFIX && String(window.SNOOZEFEST_PREFIX).trim()) || 'snoozefest';

                const usedIds = Object.keys(hass.states)
                  .filter((eid) => new RegExp(`^sensor\\.${env}_timer_\\d+_status$`).test(eid))
                  .map((eid) => parseInt(eid.match(/timer_(\d+)_status$/)?.[1] || '', 10))
                  .filter((n) => Number.isInteger(n) && n > 0 && n <= 12);

                if (usedIds.length >= 12) {
                  helpers.toastMessage('Maximum timers reached (12)');
                  return;
                }

                let nextId = null;
                for (let i = 1; i <= 12; i += 1) {
                  if (!usedIds.includes(i)) {
                    nextId = i;
                    break;
                  }
                }

                if (!nextId) {
                  helpers.toastMessage('No free timer ID available');
                  return;
                }

                await hass.callService('button', 'press', {
                  entity_id: `button.${env}_manager_add_timer`,
                });

                await new Promise((resolve) => setTimeout(resolve, 250));

                await hass.callService('text', 'set_value', {
                  entity_id: 'text.snoozefest_manager_selected_timer_id',
                  value: String(nextId),
                });
              })();
            ]]]
