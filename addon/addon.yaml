name: "Snoozefest"
description: "Local alarm and timer service with Home Assistant MQTT discovery"
version: "0.1.0"
slug: "snoozefest"
init: false
arch:
  - aarch64
  - amd64
  - armv7
  - i386
services:
  - mqtt:need
homeassistant_api: false
deny_dbus: true
deny_docker: true
map:
  - config
startup: system
boot: auto
options:
  mqtt_username: mqtt
  mqtt_password: password
schema:
  mqtt_username: str
  mqtt_password: str
ports:
  - 1883/tcp
