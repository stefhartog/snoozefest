<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Alarm clock circle -->
  <circle cx="32" cy="36" r="24" fill="#4ca3ff" opacity="0.1" stroke="#4ca3ff" stroke-width="2"/>
  
  <!-- Clock face -->
  <circle cx="32" cy="36" r="18" fill="none" stroke="#4ca3ff" stroke-width="2"/>
  
  <!-- Hour markers -->
  <g stroke="#4ca3ff" stroke-width="1.5">
    <line x1="32" y1="20" x2="32" y2="22" />
    <line x1="42.7" y1="21.3" x2="41.5" y2="22.5" />
    <line x1="48" y1="27.3" x2="46.8" y2="28.5" />
    <line x1="50" y1="36" x2="48" y2="36" />
    <line x1="48" y1="44.7" x2="46.8" y2="43.5" />
    <line x1="42.7" y1="50.7" x2="41.5" y2="49.5" />
    <line x1="32" y1="52" x2="32" y2="50" />
    <line x1="21.3" y1="50.7" x2="22.5" y2="49.5" />
    <line x1="16" y1="44.7" x2="17.2" y2="43.5" />
    <line x1="14" y1="36" x2="16" y2="36" />
    <line x1="16" y1="27.3" x2="17.2" y2="28.5" />
    <line x1="21.3" y1="21.3" x2="22.5" y2="22.5" />
  </g>
  
  <!-- Hour hand -->
  <line x1="32" y1="36" x2="32" y2="28" stroke="#4ca3ff" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Minute hand -->
  <line x1="32" y1="36" x2="40" y2="36" stroke="#4ca3ff" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Center dot -->
  <circle cx="32" cy="36" r="2" fill="#4ca3ff"/>
  
  <!-- Alarm bells (left and right) -->
  <g>
    <!-- Left bell -->
    <ellipse cx="14" cy="20" rx="3" ry="4" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
    <path d="M 12 16 Q 10 14 8 14" stroke="#ff6b6b" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    
    <!-- Right bell -->
    <ellipse cx="50" cy="20" rx="3" ry="4" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
    <path d="M 52 16 Q 54 14 56 14" stroke="#ff6b6b" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
