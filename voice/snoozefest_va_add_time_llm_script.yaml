alias: LLM Script for Snoozefest add-time timer requests
description: >-
  LLM-facing wrapper for adding time to Snoozefest timers. This script is
  intentionally explicit so an LLM can fill structured fields reliably, while
  execution still goes through the existing Snoozefest voice router.
mode: parallel
max_exceeded: silent
fields:
  add_minutes:
    selector:
      number:
        min: 1
        max: 240
        unit_of_measurement: min
        mode: box
    name: Add Minutes
    description: >-
      Mandatory. Number of minutes to add. Always provide this field.
      Example: 5 means add 5 minutes.
    required: true
  timer_id:
    selector:
      text: null
    name: Timer ID
    description: >-
      Optional timer id (numeric string like 1, 2, 3). If omitted, add-time is
      applied globally to eligible timers.
    required: true
  request_description:
    selector:
      text: null
    name: Request Description
    description: >-
      Mandatory. Short plain-language description of the user request, useful
      for logging and debugging. Example: add 5 minutes to the pasta timer.
    required: true
  request_id:
    selector:
      text: null
    name: Request ID
    description: Optional unique request id. If omitted, the script generates one.
sequence:
  - variables:
      normalized_minutes: "{{ add_minutes | int(0) }}"
      normalized_timer_id: "{{ timer_id | default('', true) | string | trim }}"
      normalized_request_id: >-
        {{ request_id | default('llm_add_time_' ~ now().strftime('%Y%m%d%H%M%S%f'), true) }}
      invalid_response:
        response: Add Minutes must be at least 1.
  - if:
      - condition: template
        value_template: "{{ normalized_minutes < 1 }}"
    then:
      - stop: Invalid add-time duration provided
        response_variable: invalid_response
  - alias: Forward structured add-time request to Snoozefest router
    service: script.snoozefest_voice_router
    data:
      action: snooze_timer
      minutes: "{{ normalized_minutes }}"
      timer_id: "{{ normalized_timer_id }}"
      request_id: "{{ normalized_request_id }}"
  - sequence: []
