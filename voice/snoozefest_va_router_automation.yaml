alias: Snoozefest Voice Master Router
description: Single Assist automation using trigger ids to route alarm and timer commands
mode: single
variables:
  mqtt_prefix: snoozefest

trigger:
  - id: set_alarm
    platform: conversation
    command:
      # Low-risk explicit alarm phrases
      - set an alarm for {time}
      - wake me up at {time}
      - wake me at {time}
      - set my alarm for {time}
      - can you set an alarm for {time}
      - i need an alarm for {time}
      - put an alarm on for {time}
      - get me up at {time}
      - wake me tomorrow at {time}
      - wake me up tomorrow at {time}
      - get me up tomorrow at {time}
      # Higher-collision shorthand, test against built-in intents
      - alarm for {time}

  - id: set_timer
    platform: conversation
    command:
      # Low-risk explicit timer phrases
      - set a timer for {minutes} minutes
      - set a timer for {minutes} minute
      - start a {minutes} minute timer
      - set a timer for {duration}
      - start a timer for {duration}
      - timer for {duration}
      - countdown for {duration}
      - start a countdown for {duration}
      - can you set a timer for {duration}
      - i need a timer for {duration}
      - put on a timer for {duration}
      - make a timer for {duration}
      - run a timer for {duration}
      # Higher-collision reminder/shorthand phrases
      - remind me in {duration}
      - in {duration}
      - wake me in {duration}

  - id: dismiss_alarm
    platform: conversation
    command:
      # Low-risk explicit dismiss phrases
      - dismiss alarm
      - stop alarm
      - turn off alarm
      - stop that alarm
      - kill the alarm
      - silence the alarm
      - shut the alarm off
      # Higher-collision natural replies
      - i am awake
      - i'm awake
      - i am up
      - i'm up

  - id: snooze_alarm
    platform: conversation
    command:
      # Low-risk explicit snooze phrases
      - snooze alarm
      - snooze the alarm
      - snooze alarm for {snooze_minutes} minutes
      - snooze alarm for {snooze_minutes} minute
      - snooze alarm for {duration}
      - snooze for {snooze_minutes} minutes
      - snooze for {snooze_minutes} minute
      - snooze for {duration}
      - snooze it for {snooze_minutes} minutes
      - snooze it for {snooze_minutes} minute
      - snooze it for {duration}
      # More conversational extensions
      - give me {snooze_minutes} more minutes
      - give me {snooze_minutes} more minute
      - give me {duration} more
      - wake me again in {snooze_minutes} minutes
      - wake me again in {snooze_minutes} minute
      - wake me again in {duration}

  - id: dismiss_timer
    platform: conversation
    command:
      # Low-risk explicit dismiss phrases
      - dismiss timer
      - stop timer
      - turn off timer
      - stop the timer
      - cancel the timer
      - turn the timer off
      - make the timer stop
      - silence the timer

  - id: snooze_timer
    platform: conversation
    command:
      # Low-risk explicit add-time phrases
      - snooze timer
      - snooze the timer
      - snooze timer for {minutes} minutes
      - snooze timer for {minutes} minute
      - snooze timer for {duration}
      - add {minutes} minutes to timer
      - add {minutes} minute to timer
      - add {duration} to timer
      - add {minutes} more minutes to timer
      - add {minutes} more minute to timer
      - add {duration} more to timer
      # More conversational extensions
      - give it {minutes} more minutes
      - give it {minutes} more minute
      - give it {duration} more
      - extend the timer by {minutes} minutes
      - extend the timer by {minutes} minute
      - extend the timer by {duration}
      - add another {minutes} minutes to the timer
      - add another {minutes} minute to the timer
      - add another {duration} to the timer


action:
  - choose:
      - conditions:
          - condition: trigger
            id:
              - set_alarm
        sequence:
          - variables:
              requested_time: "{{ trigger.slots.time }}"
              request_label: "Voice Pending {{ now().strftime('%H%M%S%f') }}"
              op_request_id: "vm_set_alarm_{{ now().strftime('%Y%m%d%H%M%S%f') }}"
          - service: script.snoozefest_voice_router
            data:
              action: set_alarm
              time: "{{ requested_time }}"
              label: "{{ request_label }}"
              temporary: true
              request_id: "{{ op_request_id }}"
          - wait_for_trigger:
              - platform: mqtt
                topic: "{{ mqtt_prefix }}/state/alarms"
                value_template: "{{ value_json | selectattr('label', 'equalto', request_label) | list | count > 0 }}"
            timeout: "00:00:05"
            continue_on_timeout: true
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ wait.trigger is not none and (wait.trigger.payload_json | selectattr('label', 'equalto', request_label) | list | count > 0) }}"
                sequence:
                  - variables:
                      created_alarm: >-
                        {{ (wait.trigger.payload_json | selectattr('label', 'equalto', request_label) | list | first) }}
                      created_alarm_id: >-
                        {{ created_alarm.id | default('') }}
                      created_alarm_status: >-
                        {{ created_alarm.status_normalized | default(created_alarm.status | default('Active')) }}
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ created_alarm_id != '' }}"
                        sequence:
                          - service: mqtt.publish
                            data:
                              topic: "{{ mqtt_prefix }}/cmd/alarm/update"
                              payload: >-
                                {{ {'id': created_alarm_id, 'label': 'VA Alarm: ' ~ requested_time} | tojson }}
                  - set_conversation_response: >-
                      Alarm set for {{ requested_time }}.
            default:
              - set_conversation_response: >-
                  I sent the alarm request, but could not confirm yet.

      - conditions:
          - condition: trigger
            id:
              - set_timer
        sequence:
          - variables:
              requested_duration: "{{ trigger.slots.duration | default(trigger.slots.minutes | default('')) }}"
              timer_request_label: "VA Timer Pending {{ now().strftime('%H%M%S%f') }}"
              op_request_id: "vm_set_timer_{{ now().strftime('%Y%m%d%H%M%S%f') }}"
          - service: script.snoozefest_voice_router
            data:
              action: set_timer
              duration_text: "{{ requested_duration }}"
              label: "{{ timer_request_label }}"
              temporary: true
              request_id: "{{ op_request_id }}"
          - wait_for_trigger:
              - platform: mqtt
                topic: "{{ mqtt_prefix }}/state/timers"
                value_template: "{{ value_json | selectattr('label', 'equalto', timer_request_label) | list | count > 0 }}"
            timeout: "00:00:05"
            continue_on_timeout: true
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ wait.trigger is not none and (wait.trigger.payload_json | selectattr('label', 'equalto', timer_request_label) | list | count > 0) }}"
                sequence:
                  - variables:
                      created_timer: >-
                        {{ (wait.trigger.payload_json | selectattr('label', 'equalto', timer_request_label) | list | first) }}
                      created_timer_id: >-
                        {{ created_timer.id | default('') }}
                      created_timer_status: >-
                        {{ created_timer.status_normalized | default(created_timer.status | default('Active')) }}
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ created_timer_id != '' }}"
                        sequence:
                          - service: mqtt.publish
                            data:
                              topic: "{{ mqtt_prefix }}/cmd/timer/update"
                              payload: >-
                                {{ {'id': created_timer_id, 'label': 'VA Timer: ' ~ requested_duration} | tojson }}
                  - set_conversation_response: >-
                      Timer set for {{ requested_duration }}.
            default:
              - set_conversation_response: >-
                  I sent the timer request, but could not confirm yet.

      - conditions:
          - condition: trigger
            id:
              - dismiss_alarm
        sequence:
          - variables:
              op_request_id: "vm_dismiss_alarm_{{ now().strftime('%Y%m%d%H%M%S%f') }}"
          - service: script.snoozefest_voice_router
            data:
              action: dismiss_alarm
              request_id: "{{ op_request_id }}"
          - wait_for_trigger:
              - platform: mqtt
                topic: "{{ mqtt_prefix }}/state/command_result"
                value_template: "{{ value_json.command == 'alarm/dismiss' and (value_json.request_id | default('')) == op_request_id }}"
            timeout: "00:00:04"
            continue_on_timeout: true
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ wait.trigger is not none and (wait.trigger.payload_json.success | default(false)) }}"
                sequence:
                  - set_conversation_response: >-
                      Dismissed.
              - conditions:
                  - condition: template
                    value_template: "{{ wait.trigger is not none and not (wait.trigger.payload_json.success | default(false)) }}"
                sequence:
                  - set_conversation_response: >-
                      No alarm found in Active or Ringing state to dismiss.
            default:
              - set_conversation_response: >-
                  I sent the dismiss command.

      - conditions:
          - condition: trigger
            id:
              - snooze_alarm
        sequence:
          - variables:
              op_request_id: "vm_snooze_alarm_{{ now().strftime('%Y%m%d%H%M%S%f') }}"
              requested_snooze_amount: >-
                {{ trigger.slots.duration | default(trigger.slots.snooze_minutes | default(trigger.slots.minutes | default(''))) }}
              requested_snooze_response: >-
                {% set raw = trigger.slots.duration | default('', true) | string | trim %}
                {% if raw != '' %}
                  {{ raw }}
                {% else %}
                  {% set m = trigger.slots.snooze_minutes | default(trigger.slots.minutes | default('')) | int(0) %}
                  {% if m > 0 %}
                    {{ m }} minute{{ '' if m == 1 else 's' }}
                  {% else %}
                    
                  {% endif %}
                {% endif %}
              ringing_alarm_count: >-
                {{
                  states.sensor
                  | selectattr('entity_id', 'match', '^sensor\\.' ~ mqtt_prefix ~ '_alarm_\\d+_status$')
                  | selectattr('state', 'eq', 'Ringing')
                  | list
                  | count
                }}
          - service: script.snoozefest_voice_router
            data:
              action: snooze_alarm
              duration_text: "{{ requested_snooze_amount }}"
              request_id: "{{ op_request_id }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ (ringing_alarm_count | int(0)) > 0 }}"
                sequence:
                  - set_conversation_response: >-
                      {% if requested_snooze_response | trim != '' %}
                        Snoozing for {{ requested_snooze_response | trim }}.
                      {% else %}
                        Snoozing.
                      {% endif %}
            default:
              - set_conversation_response: >-
                  No alarms are ringing to snooze.

      - conditions:
          - condition: trigger
            id:
              - dismiss_timer
        sequence:
          - variables:
              op_request_id: "vm_dismiss_timer_{{ now().strftime('%Y%m%d%H%M%S%f') }}"
              modifiable_timer_count: >-
                {{
                  states.sensor
                  | selectattr('entity_id', 'match', '^sensor\\.' ~ mqtt_prefix ~ '_timer_\\d+_status$')
                  | selectattr('state', 'in', ['Active', 'Paused', 'Ringing'])
                  | list
                  | count
                }}
          - service: script.snoozefest_voice_router
            data:
              action: dismiss_timer
              request_id: "{{ op_request_id }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ (modifiable_timer_count | int(0)) > 0 }}"
                sequence:
                  - set_conversation_response: >-
                      Dismissed.
            default:
              - set_conversation_response: >-
                  No timer found in Active, Paused, or Ringing state to dismiss.

      - conditions:
          - condition: trigger
            id:
              - snooze_timer
        sequence:
          - variables:
              op_request_id: "vm_snooze_timer_{{ now().strftime('%Y%m%d%H%M%S%f') }}"
              requested_add_amount: >-
                {{ trigger.slots.duration | default(trigger.slots.minutes | default(trigger.slots.snooze_minutes | default(''))) }}
              requested_add_response: >-
                {% set raw = trigger.slots.duration | default('', true) | string | trim %}
                {% if raw != '' %}
                  {{ raw }}
                {% else %}
                  {% set m = trigger.slots.minutes | default(trigger.slots.snooze_minutes | default('')) | int(0) %}
                  {% if m > 0 %}
                    {{ m }} minute{{ '' if m == 1 else 's' }}
                  {% else %}
                    
                  {% endif %}
                {% endif %}
              modifiable_timer_count: >-
                {{
                  states.sensor
                  | selectattr('entity_id', 'match', '^sensor\\.' ~ mqtt_prefix ~ '_timer_\\d+_status$')
                  | selectattr('state', 'in', ['Active', 'Paused', 'Ringing'])
                  | list
                  | count
                }}
          - service: script.snoozefest_voice_router
            data:
              action: snooze_timer
              duration_text: "{{ requested_add_amount }}"
              request_id: "{{ op_request_id }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ (modifiable_timer_count | int(0)) > 0 }}"
                sequence:
                  - set_conversation_response: >-
                      {% if requested_add_response | trim != '' %}
                        Adding {{ requested_add_response | trim }}.
                      {% else %}
                        Adding time.
                      {% endif %}
            default:
              - set_conversation_response: >-
                  No timer found in Active, Paused, or Ringing state to snooze.

    default:
      - service: persistent_notification.create
        data:
          title: Snoozefest Voice Master Automation
          message: "No route for trigger id: {{ trigger.id | default('unknown') }}"
