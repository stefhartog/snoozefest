type: custom:auto-entities
card_param: cards
card:
  type: vertical-stack
filter:
  include:
    - entity_id: sensor.snoozefest_timer_*_status
      options:
        type: custom:button-card
        entity: this.entity_id
        show_icon: false
        show_state: false
        name: |
          [[[
            try {
              var eid = (entity && entity.entity_id) ? entity.entity_id : '';
              var id = eid.replace('sensor.snoozefest_timer_', '').replace('_status', '');

              var attrs = (entity && entity.attributes) ? entity.attributes : {};
              var label = attrs.label ? String(attrs.label) : ('Timer ' + id);
              var duration = attrs.duration_friendly ? String(attrs.duration_friendly) : '';

              var statusRaw = (entity && entity.state) ? String(entity.state) : 'unknown';
              var status = statusRaw.length ? (statusRaw.charAt(0).toUpperCase() + statusRaw.slice(1)) : 'Unknown';

              var statusText = status;
              if (statusRaw === 'dismissed') {
                statusText = 'Dismissed (tap restart)';
              }

              var title = label;
              if (duration) {
                title = title + '  ' + duration;
              }

              return title + '  |  ' + statusText;
            } catch (e) {
              return 'Timer  |  loading...';
            }
          ]]]
        tap_action:
          action: none
        styles:
          card:
            - padding: 8px 12px
            - border-radius: 10px
            - transition: background-color 200ms ease
            - background-color: |
                [[[
                  try {
                    var status = (entity && entity.state) ? String(entity.state) : '';
                    if (status === 'ringing') return 'rgba(220, 38, 38, 0.25)';
                    if (status === 'running' || status === 'snoozed') return 'rgba(34, 197, 94, 0.22)';
                    return 'transparent';
                  } catch (e) {
                    return 'transparent';
                  }
                ]]]
          grid:
            - grid-template-areas: "\"n t s d r\""
            - grid-template-columns: 1fr auto auto auto auto
            - align-items: center
          name:
            - justify-self: start
          custom_fields:
            t:
              - justify-self: end
              - margin-right: 8px
            s:
              - justify-self: end
              - margin-right: 8px
            d:
              - justify-self: end
              - margin-right: 8px
            r:
              - justify-self: end
        custom_fields:
          t:
            card:
              type: custom:button-card
              entity: this.entity_id
              show_name: false
              show_icon: false
              show_state: true
              state_display: |
                [[[
                  try {
                    var id = entity.entity_id.replace('sensor.snoozefest_timer_', '').replace('_status', '');
                    var rid = 'sensor.snoozefest_timer_' + id + '_remaining';
                    var raw = (states[rid] && states[rid].state !== undefined) ? parseInt(states[rid].state, 10) : 0;
                    if (isNaN(raw) || raw < 0) raw = 0;

                    var hours = Math.floor(raw / 3600);
                    var minutes = Math.floor((raw % 3600) / 60);
                    var seconds = raw % 60;

                    function pad(v) {
                      return String(v).padStart(2, '0');
                    }

                    return pad(hours) + ':' + pad(minutes) + ':' + pad(seconds);
                  } catch (e) {
                    return '00:00:00';
                  }
                ]]]
              tap_action:
                action: none
              styles:
                card:
                  - box-shadow: none
                  - background: transparent
                  - padding: 0
          s:
            card:
              type: custom:button-card
              entity: this.entity_id
              icon: mdi:alarm-snooze
              show_name: false
              tap_action:
                action: call-service
                service: button.press
                target:
                  entity_id: |
                    [[[
                      try {
                        var id = entity.entity_id.replace('sensor.snoozefest_timer_', '').replace('_status', '');
                        return 'button.snoozefest_timer_' + id + '_snooze';
                      } catch (e) {
                        return '';
                      }
                    ]]]
              styles:
                card:
                  - box-shadow: none
                  - background: transparent
                  - padding: 0
          d:
            card:
              type: custom:button-card
              entity: this.entity_id
              icon: |
                [[[
                  try {
                    return (entity && entity.state === 'dismissed') ? 'mdi:restart' : 'mdi:check-circle-outline';
                  } catch (e) {
                    return 'mdi:check-circle-outline';
                  }
                ]]]
              show_name: false
              tap_action:
                action: call-service
                service: button.press
                target:
                  entity_id: |
                    [[[
                      try {
                        var id = entity.entity_id.replace('sensor.snoozefest_timer_', '').replace('_status', '');
                        return 'button.snoozefest_timer_' + id + '_dismiss';
                      } catch (e) {
                        return '';
                      }
                    ]]]
              styles:
                card:
                  - box-shadow: none
                  - background: transparent
                  - padding: 0
          r:
            card:
              type: custom:button-card
              entity: this.entity_id
              icon: mdi:trash-can-outline
              show_name: false
              tap_action:
                action: call-service
                service: button.press
                target:
                  entity_id: |
                    [[[
                      try {
                        var id = entity.entity_id.replace('sensor.snoozefest_timer_', '').replace('_status', '');
                        return 'button.snoozefest_timer_' + id + '_remove';
                      } catch (e) {
                        return '';
                      }
                    ]]]
              styles:
                card:
                  - box-shadow: none
                  - background: transparent
                  - padding: 0
sort:
  method: entity_id
grid_options:
  columns: full
